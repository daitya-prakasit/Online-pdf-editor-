<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Image Editor with Gemini</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .toolbar { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 800px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        input[type="file"], input[type="text"], input[type="color"], input[type="number"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .api-input { flex-grow: 1; min-width: 200px; }
        button { background-color: #007bff; color: white; border: none; padding: 9px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #editor-container { position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 100%; overflow: auto; background: white; touch-action: none; /* touch-action none zaroori hai mobile scrolling rokne ke liye */ }
        canvas { display: block; cursor: crosshair; max-width: 100%; height: auto; }
        .floating-input { position: absolute; background: transparent; border: 2px dashed #007bff; padding: 2px; outline: none; resize: none; z-index: 10; overflow: hidden; }
        .loading-badge { position: absolute; background: #ffc107; color: black; font-size: 12px; padding: 2px 5px; border-radius: 3px; z-index: 20; top: -20px; left: 0; font-weight: bold;}
    </style>
</head>
<body>

    <div class="toolbar">
        <input type="password" id="geminiApiKey" class="api-input" placeholder="Paste your Gemini API Key here...">
        <input type="file" id="uploadImg" accept="image/*">
        <label>Color:</label>
        <input type="color" id="textColor" value="#000000">
        <label>Size:</label>
        <input type="number" id="fontSize" value="24" style="width: 50px;">
        <button id="downloadBtn" style="background-color: #28a745;">Download</button>
    </div>

    <div id="editor-container">
        <canvas id="canvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const container = document.getElementById('editor-container');
    
    let img = new Image();
    let isDrawing = false;
    let startX, startY, endX, endY;
    let savedImageData = null;
    let originalFileName = "ai_edited_image.png";
    let activeInput = null;

    // 1. Image Upload
    document.getElementById('uploadImg').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        originalFileName = file.name.split('.')[0] + "_edited.png";
        
        const reader = new FileReader();
        reader.onload = function(event) {
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    // Color detection for background
    function getAverageColor(x, y, w, h) {
        try {
            const imgData = ctx.getImageData(x, y, w, h).data;
            let r=0, g=0, b=0, count=0;
            for (let i = 0; i < imgData.length; i += 4) {
                let px = (i / 4) % w, py = Math.floor((i / 4) / w);
                if (px < 4 || px > w - 4 || py < 4 || py > h - 4) {
                    r += imgData[i]; g += imgData[i+1]; b += imgData[i+2]; count++;
                }
            }
            return count === 0 ? '#ffffff' : `rgb(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)})`;
        } catch(e) { return '#ffffff'; }
    }

    // Getting Coordinates (Supports both Mouse and Mobile Touch)
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function startDraw(e) {
        if(e.touches) e.preventDefault(); // Rokne ke liye taaki mobile scroll na ho
        commitActiveInput();
        const pos = getCoords(e);
        startX = pos.x; startY = pos.y;
        isDrawing = true;
        savedImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    }

    function drawMove(e) {
        if (!isDrawing) return;
        if(e.touches) e.preventDefault();
        const pos = getCoords(e);
        ctx.putImageData(savedImageData, 0, 0);
        ctx.strokeStyle = '#007bff'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
        ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
    }

    async function endDraw(e) {
        if (!isDrawing) return;
        isDrawing = false;
        const pos = e.changedTouches ? getCoords({touches: e.changedTouches}) : getCoords(e);
        endX = pos.x; endY = pos.y;

        let x = Math.min(startX, endX), y = Math.min(startY, endY);
        let w = Math.abs(endX - startX), h = Math.abs(endY - startY);

        if (w < 15 || h < 15) { ctx.putImageData(savedImageData, 0, 0); return; }

        ctx.putImageData(savedImageData, 0, 0); // Dashed line hatao
        
        // --- GEMINI API KE LIYE IMAGE CROP KARNA ---
        const croppedImgData = ctx.getImageData(x, y, w, h);
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w; tempCanvas.height = h;
        tempCanvas.getContext('2d').putImageData(croppedImgData, 0, 0);
        const base64Image = tempCanvas.toDataURL('image/jpeg').split(',')[1];

        // Background color bhar do (Purana text hide)
        ctx.fillStyle = getAverageColor(x, y, w, h);
        ctx.fillRect(x, y, w, h);

        // Text input banao
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
        createTextInput(x, y, w, h, scaleX, scaleY);

        // Gemini AI Call
        const apiKey = document.getElementById('geminiApiKey').value;
        if (apiKey) {
            fetchGeminiText(apiKey, base64Image, activeInput);
        }
    }

    // Events Attach Karna (Mouse + Mobile Touch)
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', drawMove);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('touchstart', startDraw, {passive: false});
    canvas.addEventListener('touchmove', drawMove, {passive: false});
    canvas.addEventListener('touchend', endDraw);

    function createTextInput(x, y, w, h, scaleX, scaleY) {
        const wrapper = document.createElement('div');
        wrapper.style.position = 'absolute';
        wrapper.style.left = (x / scaleX) + 'px';
        wrapper.style.top = (y / scaleY) + 'px';

        const badge = document.createElement('div');
        badge.className = 'loading-badge';
        badge.innerText = 'AI Ready';
        badge.id = 'ai-badge';

        const input = document.createElement('textarea');
        input.className = 'floating-input';
        input.style.width = (w / scaleX) + 'px';
        input.style.height = (h / scaleY) + 'px';
        
        const fontSize = document.getElementById('fontSize').value;
        input.style.fontSize = (fontSize / scaleY) + 'px'; 
        input.style.color = document.getElementById('textColor').value;
        
        input.dataset.cx = x; input.dataset.cy = y;

        wrapper.appendChild(badge);
        wrapper.appendChild(input);
        container.appendChild(wrapper);
        
        input.focus();
        activeInput = input;
        wrapper.activeWrapper = true;
    }

    // Gemini API Fetch Function
    async function fetchGeminiText(apiKey, base64Image, inputElement) {
        const badge = document.getElementById('ai-badge');
        badge.innerText = '🤖 Reading...';
        badge.style.background = '#17a2b8'; badge.style.color = 'white';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Read the text in this image. Return strictly ONLY the text you see. No markdown, no quotes, no explanations." },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                        ]
                    }]
                })
            });
            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                inputElement.value = data.candidates[0].content.parts[0].text.trim();
                badge.innerText = '✅ Done';
                badge.style.background = '#28a745';
            }
        } catch (error) {
            badge.innerText = '❌ Failed';
            badge.style.background = '#dc3545';
        }
        setTimeout(() => { if(badge) badge.style.display = 'none'; }, 2000);
    }

    function commitActiveInput() {
        if (!activeInput) return;
        const text = activeInput.value;
        if (text.trim() !== '') {
            const cx = parseFloat(activeInput.dataset.cx), cy = parseFloat(activeInput.dataset.cy);
            const fontSize = document.getElementById('fontSize').value;
            ctx.font = `${fontSize}px Arial`;
            ctx.fillStyle = document.getElementById('textColor').value;
            ctx.textBaseline = 'top';
            
            const lines = text.split('\n');
            let currentY = cy + 2; 
            for(let i=0; i<lines.length; i++) {
                ctx.fillText(lines[i], cx + 2, currentY);
                currentY += parseInt(fontSize) + 2;
            }
        }
        const wrapper = activeInput.parentNode;
        if (wrapper && wrapper.parentNode) wrapper.parentNode.removeChild(wrapper);
        activeInput = null;
    }

    // Click outside to save text
    document.addEventListener('click', function(e) {
        if (activeInput && e.target !== activeInput && e.target.tagName !== 'CANVAS') {
            commitActiveInput();
        }
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
        commitActiveInput(); 
        const link = document.createElement('a');
        link.download = originalFileName;
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
</script>

</body>
</html>
