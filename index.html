<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITYA Image Text Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg: #f3f4f6; --surface: #ffffff; --border: #e5e7eb; --text: #1f2937; --text-muted: #6b7280; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--surface); border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); padding: 30px; border: 1px solid var(--border); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); margin: 0 0 10px 0; font-weight: 800; }
        .header p { color: var(--text-muted); margin: 0; font-size: 15px; }
        
        .upload-section { border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: 12px; background: #f9fafb; margin-bottom: 25px; cursor: pointer; transition: 0.3s; }
        .upload-section:hover { border-color: var(--primary); background: #eff6ff; }
        input[type="file"] { font-size: 15px; }

        .editor-panels { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
        .control-panel { background: #f9fafb; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .control-panel h3 { margin-top: 0; color: var(--text); }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .input-group label { font-size: 13px; font-weight: 600; color: var(--text); }
        input[type="text"] { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .btn { background: var(--primary); color: white; border: none; padding: 14px 20px; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

        #status { text-align: center; padding: 15px; border-radius: 8px; background: #fff3cd; color: #856404; font-weight: 600; margin-bottom: 20px; display: none; }
        
        .result-panel { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: #e5e7eb; min-height: 400px; display: flex; align-items: center; justify-content: center; }
        canvas { max-width: 100%; height: auto; display: block; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); }

        @media (max-width: 768px) { .editor-panels { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>DAITYA Image Text Replacer</h1>
            <p>Advanced Client-Side Bypass for Photo Text Modification (OCR + Canvas In-Painting)</p>
        </div>

        <div id="status">Initializing... Please upload an image.</div>

        <div class="upload-section">
            <input type="file" id="uploadImage" accept="image/*" />
        </div>

        <div class="editor-panels">
            <div class="control-panel">
                <h3>Replacement Rules</h3>
                <div class="input-group">
                    <label>Existing Text (Exact Match)</label>
                    <input type="text" id="oldText" placeholder="e.g. STOP">
                </div>
                <div class="input-group">
                    <label>Replacement Text</label>
                    <input type="text" id="newText" placeholder="e.g. GO NOW">
                </div>
                <button class="btn" id="btnReplace" onclick="processTextReplacement()" disabled>
                    ⟳ Execute Replace
                </button>
            </div>
            
            <div class="result-panel">
                <canvas id="outputCanvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        let currentImage = null;
        const statusEl = document.getElementById('status');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');

        function showStatus(msg, isError = false) {
            statusEl.style.display = 'block';
            statusEl.innerText = msg;
            statusEl.style.background = isError ? '#f8d7da' : '#d4edda';
            statusEl.style.color = isError ? '#721c24' : '#155724';
        }

        // Handle Image Upload
        document.getElementById('uploadImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImage = new Image();
                    currentImage.onload = function() {
                        canvas.width = currentImage.width;
                        canvas.height = currentImage.height;
                        ctx.drawImage(currentImage, 0, 0);
                        showStatus('Image loaded. Enter the text to replace and its replacement.');
                        document.getElementById('btnReplace').disabled = false;
                    };
                    currentImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // The Bypass Logic: OCR + Canvas Masking + Redraw
        async function processTextReplacement() {
            if (!currentImage) return;
            const oldTextTarget = document.getElementById('oldText').value.trim();
            const newTextData = document.getElementById('newText').value;

            if (!oldTextTarget || oldTextTarget === "") {
                showStatus('Error: Specify the existing text to replace.', true);
                return;
            }

            try {
                showStatus('Analyzing image with Tesseract.js (OCR)...');
                document.getElementById('btnReplace').disabled = true;

                // Step 1: Perform OCR
                const { data: { words } } = await Tesseract.recognize(
                    canvas,
                    'eng', // Default to English; can expand for multi-lang
                    { logger: m => console.log(m) } // Keep progress in console
                );

                // Step 2: Find the matching text bounding box
                const targetWord = words.find(w => w.text.toLowerCase() === oldTextTarget.toLowerCase());

                if (!targetWord) {
                    showStatus(`Error: Text "${oldTextTarget}" not found in image. Try exactly.`, true);
                    document.getElementById('btnReplace').disabled = false;
                    return;
                }

                showStatus(`Text found! Executing replacement bypass...`);
                const { x0, y0, x1, y1 } = targetWord.bbox;
                const width = x1 - x0;
                const height = y1 - y0;

                // Step 3: Rudimentary In-Painting (The Bypass)
                // We calculate the average color of the pixels SURROUNDING the text to make a mask.
                // It's a client-side hack for advanced background in-painting.
                const padding = 10;
                const maskRect = {
                    x: Math.max(0, x0 - padding),
                    y: Math.max(0, y0 - padding),
                    w: width + (padding * 2),
                    h: height + (padding * 2)
                };

                const imageData = ctx.getImageData(maskRect.x, maskRect.y, maskRect.w, maskRect.h).data;
                let r=0, g=0, b=0, count=0;
                for (let i = 0; i < imageData.length; i += 4) {
                    r += imageData[i];
                    g += imageData[i+1];
                    b += imageData[i+2];
                    count++;
                }
                const avgColor = `rgb(${Math.round(r/count)}, ${Math.round(g/count)}, ${Math.round(b/count)})`;

                // Draw the mask (fill the bounding box with the average color)
                ctx.fillStyle = avgColor;
                ctx.fillRect(x0, y0, width, height);

                // Step 4: Redraw New Text
                // Guess font style/color from OCR results if needed, or default
                const guessedColor = getBestTextColor(avgColor); // Basic logic for readable text
                ctx.font = `bold ${height}px 'Segoe UI', system-ui, sans-serif`;
                ctx.fillStyle = guessedColor;
                ctx.textBaseline = 'top';
                ctx.fillText(newTextData, x0, y0);

                showStatus(`SUCCESS: Text replaced with "${newTextData}" on canvas.`);
                document.getElementById('btnReplace').disabled = false;

            } catch (err) {
                showStatus('Error processing text replacement: ' + err.message, true);
                document.getElementById('btnReplace').disabled = false;
            }
        }

        function getBestTextColor(backgroundColor) {
            // Very simple color check: if background is too dark, use white; else use black.
            const rgb = backgroundColor.match(/\d+/g);
            const brightness = Math.round(((parseInt(rgb[0]) * 299) +
                                           (parseInt(rgb[1]) * 587) +
                                           (parseInt(rgb[2]) * 114)) / 1000);
            return (brightness > 125) ? 'black' : 'white';
        }
    </script>
</body>
</html>
