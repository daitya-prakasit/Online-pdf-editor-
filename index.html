<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy PDF Editor</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #777;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .upload-area {
            border: 2px dashed #007BFF;
            padding: 30px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            background-color: #fafbfc;
            transition: background 0.3s, border-color 0.3s;
        }
        .upload-area:hover {
            background-color: #eef5ff;
            border-color: #0056b3;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        #status {
            margin-top: 15px;
            color: #28a745;
            font-weight: bold;
            font-size: 14px;
            min-height: 20px;
        }
        .edit-controls {
            display: none; /* Jab tak PDF upload nahi hota, ye hide rahega */
            margin-top: 20px;
            text-align: left;
        }
        .edit-controls label {
            font-weight: bold;
            color: #444;
            display: block;
            margin-bottom: 8px;
        }
        .edit-controls input[type="text"] {
            width: calc(100% - 24px);
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>PDF Editor</h1>
    <p class="subtitle">Upload, Add Text & Download</p>
    
    <div class="upload-area" onclick="document.getElementById('pdfInput').click()">
        📁 <strong>Click here to Upload PDF</strong>
        <input type="file" id="pdfInput" accept="application/pdf">
    </div>

    <div class="edit-controls" id="editControls">
        <label for="textToAdd">Add Text to First Page:</label>
        <input type="text" id="textToAdd" placeholder="Type something to write on PDF...">
        <button class="btn" id="editBtn">Apply Changes & Download</button>
    </div>

    <p id="status"></p>
</div>

<script>
    let uploadedPdfBytes = null;
    let originalFileName = "document";

    // 1. Handle File Upload
    document.getElementById('pdfInput').addEventListener('change', async (event) => {
        const file = event.target.files[0];
        if (file && file.type === 'application/pdf') {
            originalFileName = file.name.replace('.pdf', '');
            document.getElementById('status').style.color = '#555';
            document.getElementById('status').innerText = `File selected: ${file.name}`;
            
            // Convert file to ArrayBuffer
            const arrayBuffer = await file.arrayBuffer();
            uploadedPdfBytes = new Uint8Array(arrayBuffer);
            
            // Show edit options
            document.getElementById('editControls').style.display = 'block';
        } else {
            alert('Please upload a valid PDF file.');
        }
    });

    // 2. Handle Editing and Downloading
    document.getElementById('editBtn').addEventListener('click', async () => {
        if (!uploadedPdfBytes) return;

        const text = document.getElementById('textToAdd').value;
        if (!text) {
            alert('Please enter some text to add before downloading.');
            return;
        }

        try {
            document.getElementById('status').style.color = '#007BFF';
            document.getElementById('status').innerText = 'Processing PDF...';

            // pdf-lib library se functions nikalna
            const { PDFDocument, rgb } = PDFLib;
            
            // Uploaded PDF ko load karna
            const pdfDoc = await PDFDocument.load(uploadedPdfBytes);

            // PDF ka pehla page select karna
            const pages = pdfDoc.getPages();
            const firstPage = pages[0];

            // Page par text likhna (Position x: 50, y: top se thoda niche)
            firstPage.drawText(text, {
                x: 50,
                y: firstPage.getHeight() - 100,
                size: 24,
                color: rgb(0.8, 0.1, 0.1) // Red color me text aayega
            });

            // Edited PDF ko wapas bytes me convert karna
            const pdfBytes = await pdfDoc.save();

            // 3. Trigger Download
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${originalFileName}_edited.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            document.getElementById('status').style.color = '#28a745';
            document.getElementById('status').innerText = 'PDF Downloaded Successfully! 🎉';
            
        } catch (error) {
            console.error("PDF Edit Error: ", error);
            document.getElementById('status').style.color = 'red';
            document.getElementById('status').innerText = 'Error while editing the PDF.';
        }
    });
</script>

</body>
</html>
