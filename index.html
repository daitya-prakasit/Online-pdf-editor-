<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movable Text Image Editor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .toolbar { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 900px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between;}
        .tool-group { display: flex; align-items: center; gap: 8px; }
        input[type="file"], input[type="text"], input[type="color"], input[type="number"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; border: none; padding: 9px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #canvas-wrapper { position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 100%; max-height: 80vh; overflow: auto; background: white; touch-action: none; border: 1px solid #ddd;}
        canvas { display: block; cursor: default; max-width: 100%; height: auto; }
        
        /* Floating Text Box */
        .movable-text {
            position: absolute;
            cursor: move;
            border: 2px solid transparent;
            padding: 2px;
            user-select: none; /* Text select na ho, sirf drag ho */
            white-space: nowrap; /* Multi-line handle karne ke liye naya logix chahiye, abhi single line hai */
        }
        
        /* Selected State */
        .movable-text.selected {
            border: 2px dashed #007bff;
            background-color: rgba(0, 123, 255, 0.1);
        }
        
        /* Instructions for deletion */
        .instructions { font-size: 12px; color: #666; margin-top: -10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="tool-group">
            <input type="file" id="uploadImg" accept="image/*">
        </div>
        
        <div class="tool-group">
            <input type="text" id="newTextContent" placeholder="Naya text yahan likhein...">
            <button id="addTextBtn" class="active-mode">🟢 Add Movable Text</button>
        </div>

        <div class="tool-group">
            <label>Color:</label>
            <input type="color" id="textColor" value="#000000">
            <label>Size:</label>
            <input type="number" id="fontSize" value="30" style="width: 55px;">
        </div>

        <div class="tool-group">
            <button id="downloadBtn" style="background-color: #28a745;">Download</button>
        </div>
    </div>
    
    <div class="instructions">Tip: Click text to select. Drag to move. Press 'Delete' keyboard key to remove.</div>

    <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
        </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvas-wrapper');
    const img = new Image();
    let originalFileName = "edited_image.png";
    let textObjects = []; // Array to store all text elements
    let selectedTextWrapper = null; // Track selected element
    
    // 1. Image Upload
    document.getElementById('uploadImg').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        originalFileName = file.name.split('.')[0] + "_edited.png";
        
        const reader = new FileReader();
        reader.onload = function(event) {
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                // Nayi image par purane text objects clear karna (agar ho toh)
                clearAllTexts();
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    // 2. Add New Movable Text
    document.getElementById('addTextBtn').addEventListener('click', function() {
        if(!img.src) { alert("Pehle Image upload karein!"); return; }
        
        const content = document.getElementById('newTextContent').value;
        if (!content.trim()) { alert("Kripya text box me kuch likhein!"); return; }

        const fontSize = document.getElementById('fontSize').value;
        const color = document.getElementById('textColor').value;
        
        // Default position image ke beech me (canvas coordinates)
        const canvasX = canvas.width / 4;
        const canvasY = canvas.height / 2;
        
        createTextElement(content, canvasX, canvasY, fontSize, color);
        document.getElementById('newTextContent').value = ''; // Reset input
    });

    // 3. Create & Manage Movable HTML Elements over Canvas
    function createTextElement(content, x, y, size, color) {
        const textWrapper = document.createElement('div');
        textWrapper.className = 'movable-text';
        textWrapper.innerText = content;
        
        // CSS properties setting
        textWrapper.style.fontSize = size + 'px';
        textWrapper.style.color = color;
        textWrapper.style.fontFamily = 'Arial, sans-serif'; // Default font
        textWrapper.style.fontWeight = 'bold';
        
        // Initial position (CSS absolutely positioned)
        // We calculate positions relative to image scale
        const rect = canvas.getBoundingClientRect();
        const scaleX = rect.width / canvas.width;
        const scaleY = rect.height / canvas.height;
        
        textWrapper.style.left = (x * scaleX) + 'px';
        textWrapper.style.top = (y * scaleY) + 'px';
        
        // Store underlying data
        textWrapper.dataset.origX = x;
        textWrapper.dataset.origY = y;
        textWrapper.dataset.size = size;
        textWrapper.dataset.color = color;

        // --- Drag & Selection Logic ---
        setupDragging(textWrapper);
        textWrapper.addEventListener('click', (e) => selectText(textWrapper, e));

        wrapper.appendChild(textWrapper);
        selectText(textWrapper); // Select immediately upon creation
    }
    
    function setupDragging(el) {
        let isDragging = false;
        let startX, startY;

        function onMouseDown(e) {
            isDragging = true;
            selectText(el, e); // Selection handles z-index, so it brings it to front

            const rect = wrapper.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Mouse relative offset inside element
            startX = clientX - el.offsetLeft - rect.left;
            startY = clientY - el.offsetTop - rect.top;
            e.stopPropagation();
        }

        function onMouseMove(e) {
            if (!isDragging) return;
            e.preventDefault();

            const rect = wrapper.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Nayi position calculate karna
            let newX = clientX - rect.left - startX;
            let newY = clientY - rect.top - startY;

            // Apply positions (HTML pixels)
            el.style.left = newX + 'px';
            el.style.top = newY + 'px';
            
            // Wapas original image coordinates update karna storage ke liye
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            el.dataset.origX = newX * scaleX;
            el.dataset.origY = newY * scaleY;
        }

        function onMouseUp() { isDragging = false; }

        el.addEventListener('mousedown', onMouseDown);
        el.addEventListener('touchstart', onMouseDown, {passive: false});
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('touchmove', onMouseMove, {passive: false});
        document.addEventListener('mouseup', onMouseUp);
        document.addEventListener('touchend', onMouseUp);
    }
    
    function selectText(el, event) {
        if(event) event.stopPropagation();
        
        // Deselect previous
        if(selectedTextWrapper) selectedTextWrapper.classList.remove('selected');
        
        // Select new
        selectedTextWrapper = el;
        selectedTextWrapper.classList.add('selected');
        
        // Update toolbar values to match selected
        document.getElementById('fontSize').value = selectedTextWrapper.dataset.size;
        // Color input doesn't update easily due to different format issues, keep current.
    }
    
    // Clear selection click anywhere else
    wrapper.addEventListener('click', () => {
        if(selectedTextWrapper) selectedTextWrapper.classList.remove('selected');
        selectedTextWrapper = null;
    });

    // Handle Deletion via Keyboard 'Delete' key
    document.addEventListener('keydown', function(e) {
        if (selectedTextWrapper && (e.key === 'Delete' || e.key === 'Backspace')) {
            wrapper.removeChild(selectedTextWrapper);
            selectedTextWrapper = null;
        }
    });

    // Toolbar updates selected text color/size
    document.getElementById('textColor').addEventListener('input', function() {
        if(selectedTextWrapper) {
            selectedTextWrapper.style.color = this.value;
            selectedTextWrapper.dataset.color = this.value;
        }
    });
    
    document.getElementById('fontSize').addEventListener('input', function() {
        if(selectedTextWrapper) {
            selectedTextWrapper.style.fontSize = this.value + 'px';
            selectedTextWrapper.dataset.size = this.value;
        }
    });

    function clearAllTexts() {
        const texts = wrapper.querySelectorAll('.movable-text');
        texts.forEach(text => wrapper.removeChild(text));
        selectedTextWrapper = null;
    }

    // 4. DOWNLOAD: Combine Image + Floating Text Objects onto Canvas
    document.getElementById('downloadBtn').addEventListener('click', function() {
        if(!img.src) { alert("Pehle Image upload karein!"); return; }
        
        // Deselect current if any
        if(selectedTextWrapper) selectedTextWrapper.classList.remove('selected');

        // Create a temporary final canvas
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = canvas.width;
        finalCanvas.height = canvas.height;
        const finalCtx = finalCanvas.getContext('2d');
        
        // Draw original image first
        finalCtx.drawImage(img, 0, 0);
        
        // Draw all floating text elements at their stored positions
        const floatingTexts = wrapper.querySelectorAll('.movable-text');
        floatingTexts.forEach(textWrapper => {
            const x = parseFloat(textWrapper.dataset.origX);
            const y = parseFloat(textWrapper.dataset.origY);
            const size = parseInt(textWrapper.dataset.size);
            const color = textWrapper.dataset.color;
            const textContent = textWrapper.innerText;

            finalCtx.font = `bold ${size}px Arial, sans-serif`;
            finalCtx.fillStyle = color;
            finalCtx.textBaseline = 'top'; // Matches HTML rendering logic
            
            // Draw on actual image pixels
            finalCtx.fillText(textContent, x, y);
        });

        // Generate download link
        const link = document.createElement('a');
        link.download = originalFileName;
        link.href = finalCanvas.toDataURL("image/png");
        link.click();
    });
</script>

</body>
</html>
