<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Image Editor (Clone & Bg Changer)</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f3f4f6; --text: #1f2937; --border: #e5e7eb; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Topbar */
        .topbar { background: white; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); z-index: 10; }
        .topbar h1 { font-size: 18px; color: var(--primary); }
        .btn { padding: 8px 15px; border-radius: 6px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #10b981; color: white; }
        
        /* Layout */
        .workspace { display: flex; flex: 1; height: calc(100vh - 60px); }
        
        /* Sidebar */
        .sidebar { width: 280px; background: white; border-right: 1px solid var(--border); padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .section-title { font-size: 12px; text-transform: uppercase; color: gray; font-weight: bold; margin-bottom: 5px; }
        
        .tool-btn { width: 100%; padding: 10px; background: white; border: 1px solid var(--border); border-radius: 6px; text-align: left; cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .tool-btn.active { border-color: var(--primary); background: #eef2ff; color: var(--primary); }
        
        input[type="file"] { display: none; }
        .upload-label { display: block; width: 100%; padding: 10px; background: #f9fafb; border: 1px dashed gray; border-radius: 6px; text-align: center; cursor: pointer; font-size: 14px; margin-bottom: 10px;}
        
        .control-group { margin-bottom: 10px; }
        .control-group label { font-size: 12px; color: gray; display: block; margin-bottom: 3px; }
        .input-box { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; }
        
        /* Canvas Area */
        .canvas-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: auto; background: #e5e7eb; }
        #canvas-wrapper { position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2); background-size: cover; background-position: center; }
        canvas { display: block; max-width: 100%; height: auto; touch-action: none; }
        
        /* Floating Text */
        .floating-text { position: absolute; cursor: grab; padding: 2px; border: 1px solid transparent; user-select: none; white-space: pre-wrap; word-wrap: break-word; min-width: 20px; }
        .floating-text.selected { border: 2px dashed var(--primary); }
        .floating-text:focus { outline: none; border: 2px solid var(--primary); cursor: text; }
        
        #hintBox { font-size: 12px; color: #d97706; background: #fef3c7; padding: 8px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

    <div class="topbar">
        <h1>🛠️ Pro Editor</h1>
        <button class="btn btn-success" id="downloadBtn">⬇ Download Image</button>
    </div>

    <div class="workspace">
        <div class="sidebar">
            <div>
                <div class="section-title">1. Images</div>
                <label for="uploadImg" class="upload-label">🖼️ Upload Main Image</label>
                <input type="file" id="uploadImg" accept="image/*">
                
                <label for="uploadBg" class="upload-label">🌄 Upload New Background</label>
                <input type="file" id="uploadBg" accept="image/*">
            </div>

            <div>
                <div class="section-title">2. Editing Tools</div>
                <button class="tool-btn active" id="modeSelect">🖱️ Select / Move</button>
                <button class="tool-btn" id="modeClone">🖌️ Clone Brush (Fix Texture)</button>
                <button class="tool-btn" id="modeErase">🧽 Eraser (Remove Bg)</button>
                <button class="tool-btn" id="addTextBtn" style="justify-content: center; background: var(--primary); color: white;">➕ Add Text</button>
                
                <div id="hintBox"></div>
                
                <div class="control-group" id="brushSettings" style="display: none; margin-top: 10px;">
                    <label>Brush Size: <span id="brushSizeVal">30</span>px</label>
                    <input type="range" id="brushSize" min="5" max="100" value="30" style="width: 100%;">
                </div>
            </div>

            <div id="textProps" style="display: none;">
                <div class="section-title">Text Properties</div>
                <div class="control-group">
                    <label>Color</label>
                    <input type="color" id="textColor" class="input-box" style="padding: 2px; height: 35px;">
                </div>
                <div class="control-group">
                    <label>Size</label>
                    <input type="number" id="textSize" class="input-box" value="30">
                </div>
                <button class="btn" id="deleteTextBtn" style="width: 100%; background: #fee2e2; color: #ef4444; border: 1px solid #fca5a5;">🗑️ Delete Text</button>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-wrapper">
                <canvas id="canvas"></canvas>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const wrapper = document.getElementById('canvas-wrapper');
    const hintBox = document.getElementById('hintBox');
    const brushSettings = document.getElementById('brushSettings');
    
    let mainImg = new Image();
    let originalFilename = "edited_image.png";
    let currentMode = 'select'; // select, clone-pick, clone-paint, erase
    let selectedText = null;
    let isDrawing = false;
    
    // Clone Brush Variables
    let cloneSrcX = 0, cloneSrcY = 0;
    let cloneImgData = null; // To store original pixels for clean copying

    // --- TOOL SWITCHING ---
    function setMode(mode) {
        currentMode = mode;
        document.getElementById('modeSelect').classList.remove('active');
        document.getElementById('modeClone').classList.remove('active');
        document.getElementById('modeErase').classList.remove('active');
        
        hintBox.style.display = 'none';
        brushSettings.style.display = 'none';
        canvas.style.cursor = 'default';

        if(mode === 'select') {
            document.getElementById('modeSelect').classList.add('active');
        } 
        else if (mode === 'clone-pick') {
            document.getElementById('modeClone').classList.add('active');
            canvas.style.cursor = 'crosshair';
            hintBox.style.display = 'block';
            hintBox.innerText = "Step 1: Canvas par wahan CLICK karein jahan se texture/color COPY karna hai (Jaise saaf cream background).";
            brushSettings.style.display = 'block';
            deselectText();
        }
        else if (mode === 'clone-paint') {
            document.getElementById('modeClone').classList.add('active');
            canvas.style.cursor = 'cell';
            hintBox.style.display = 'block';
            hintBox.innerText = "Step 2: Ab grey dabbe ke upar mouse se DRAG karke paint karein. Naya source chunne ke liye tool pe dubara click karein.";
            brushSettings.style.display = 'block';
        }
        else if (mode === 'erase') {
            document.getElementById('modeErase').classList.add('active');
            canvas.style.cursor = 'not-allowed'; // Custom cursor can be used
            hintBox.style.display = 'block';
            hintBox.innerText = "Jahan background mitana hai wahan paint karein. Naya Background lagane ke liye left se upload karein.";
            brushSettings.style.display = 'block';
            deselectText();
        }
    }

    document.getElementById('modeSelect').addEventListener('click', () => setMode('select'));
    document.getElementById('modeClone').addEventListener('click', () => {
        // Hamesha pehle 'pick' mode me jayega taaki source select ho
        cloneImgData = ctx.getImageData(0, 0, canvas.width, canvas.height); 
        setMode('clone-pick');
    });
    document.getElementById('modeErase').addEventListener('click', () => setMode('erase'));
    
    document.getElementById('brushSize').addEventListener('input', function() {
        document.getElementById('brushSizeVal').innerText = this.value;
    });

    // --- UPLOADS ---
    // 1. Main Image
    document.getElementById('uploadImg').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        originalFilename = "edited_" + file.name;
        const reader = new FileReader();
        reader.onload = (ev) => {
            mainImg.onload = () => {
                canvas.width = mainImg.width; canvas.height = mainImg.height;
                ctx.drawImage(mainImg, 0, 0);
                wrapper.style.width = mainImg.width + 'px';
                wrapper.style.height = mainImg.height + 'px';
            }
            mainImg.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    // 2. Background Image
    document.getElementById('uploadBg').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            // Wrapper ke CSS background me set kar dete hain
            wrapper.style.backgroundImage = `url(${ev.target.result})`;
            setMode('erase'); // Automatically eraser select ho jaye
        };
        reader.readAsDataURL(file);
    });

    // --- CANVAS DRAWING (CLONE & ERASE) ---
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('touchstart', startDrawing, {passive: false});

    function startDrawing(e) {
        if(currentMode === 'select') return;
        if(e.touches) e.preventDefault();
        
        const pos = getMousePos(e);
        
        if (currentMode === 'clone-pick') {
            // Source set karo aur paint mode me jao
            cloneSrcX = pos.x;
            cloneSrcY = pos.y;
            setMode('clone-paint');
            return;
        }
        
        isDrawing = true;
        drawProcess(pos.x, pos.y);
    }

    canvas.addEventListener('mousemove', (e) => { if(isDrawing) drawProcess(getMousePos(e).x, getMousePos(e).y); });
    canvas.addEventListener('touchmove', (e) => { if(isDrawing) { e.preventDefault(); drawProcess(getMousePos(e).touches ? getMousePos(e).x : getMousePos({touches:[e.touches[0]]}).x, getMousePos({touches:[e.touches[0]]}).y); } }, {passive: false});

    window.addEventListener('mouseup', () => isDrawing = false);
    window.addEventListener('touchend', () => isDrawing = false);

    function drawProcess(x, y) {
        const bSize = parseInt(document.getElementById('brushSize').value);
        
        if (currentMode === 'erase') {
            // Make pixels transparent
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, bSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over'; // reset
        } 
        else if (currentMode === 'clone-paint') {
            // Clone texture logic
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, bSize, 0, Math.PI * 2);
            ctx.clip();
            
            // Draw original pixels from the selected source area
            // Offset logic: hum mouse (x,y) par source (cloneSrcX, cloneSrcY) ka center draw karna chahte hain
            const offsetX = x - cloneSrcX;
            const offsetY = y - cloneSrcY;
            
            // Use a temporary canvas to draw the snapshot we took during clone-pick
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
            tempCanvas.getContext('2d').putImageData(cloneImgData, 0, 0);
            
            ctx.drawImage(tempCanvas, offsetX, offsetY);
            ctx.restore();
        }
    }


    // --- FLOATING TEXT LOGIC ---
    document.getElementById('addTextBtn').addEventListener('click', () => {
        setMode('select');
        const textDiv = document.createElement('div');
        textDiv.className = 'floating-text';
        textDiv.innerText = "Double Click Edit";
        textDiv.style.fontSize = '40px';
        textDiv.style.color = '#ff0000';
        textDiv.style.fontWeight = 'bold';
        
        // Center text initially
        textDiv.style.left = '50px';
        textDiv.style.top = '50px';
        
        setupTextDrag(textDiv);
        wrapper.appendChild(textDiv);
        selectText(textDiv);
    });

    function setupTextDrag(el) {
        let isDraggingText = false, startX, startY;

        el.addEventListener('dblclick', () => {
            if(currentMode !== 'select') return;
            el.contentEditable = true; el.focus();
            document.execCommand('selectAll', false, null);
        });
        el.addEventListener('blur', () => { el.contentEditable = false; });

        const dragStart = (e) => {
            if(currentMode !== 'select' || el.contentEditable === "true") return;
            selectText(el);
            isDraggingText = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX - el.offsetLeft;
            startY = clientY - el.offsetTop;
            if(!e.touches) e.stopPropagation();
        };

        el.addEventListener('mousedown', dragStart);
        el.addEventListener('touchstart', dragStart, {passive: false});

        const dragMove = (e) => {
            if(!isDraggingText) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            el.style.left = (clientX - startX) + 'px';
            el.style.top = (clientY - startY) + 'px';
        };

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('touchmove', (e) => { if(isDraggingText){ e.preventDefault(); dragMove(e); } }, {passive: false});
        
        const dragEnd = () => isDraggingText = false;
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchend', dragEnd);
    }

    function selectText(el) {
        deselectText();
        selectedText = el;
        selectedText.classList.add('selected');
        document.getElementById('textProps').style.display = 'block';
        
        // RGB to Hex converter
        let rgb = selectedText.style.color.match(/\d+/g);
        let hex = rgb ? `#${((1<<24)+(parseInt(rgb[0])<<16)+(parseInt(rgb[1])<<8)+parseInt(rgb[2])).toString(16).slice(1)}` : '#000000';
        
        document.getElementById('textColor').value = hex;
        document.getElementById('textSize').value = parseInt(selectedText.style.fontSize);
    }

    function deselectText() {
        if(selectedText) {
            selectedText.classList.remove('selected');
            selectedText.contentEditable = false;
        }
        selectedText = null;
        document.getElementById('textProps').style.display = 'none';
    }

    wrapper.addEventListener('mousedown', (e) => { if(e.target === canvas) deselectText(); });

    // Text Properties Listeners
    document.getElementById('textColor').addEventListener('input', function() { if(selectedText) selectedText.style.color = this.value; });
    document.getElementById('textSize').addEventListener('input', function() { if(selectedText) selectedText.style.fontSize = this.value + 'px'; });
    document.getElementById('deleteTextBtn').addEventListener('click', function() { if(selectedText) { selectedText.remove(); deselectText(); } });

    // --- FINAL DOWNLOAD ---
    document.getElementById('downloadBtn').addEventListener('click', function() {
        if(canvas.width === 300) { alert("Pehle Image upload karein!"); return; } // default width check
        deselectText();
        
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = canvas.width; finalCanvas.height = canvas.height;
        const finalCtx = finalCanvas.getContext('2d');
        
        // Agar CSS me background image hai, toh usko bhi render karna padega
        const bgUrl = wrapper.style.backgroundImage.slice(5, -2);
        if(bgUrl) {
            const bgImg = new Image();
            bgImg.src = bgUrl;
            // Draw background image scaled to fit canvas
            finalCtx.drawImage(bgImg, 0, 0, finalCanvas.width, finalCanvas.height);
        } else {
            // Default background agar PNG me transparent area hai
            finalCtx.fillStyle = '#ffffff';
            finalCtx.fillRect(0,0, finalCanvas.width, finalCanvas.height);
        }
        
        // Main canvas draw (jisme clone aur erase ho chuka hai)
        finalCtx.drawImage(canvas, 0, 0);

        // Draw Floating Texts
        const scaleX = canvas.width / wrapper.clientWidth;
        const scaleY = canvas.height / wrapper.clientHeight;
        
        document.querySelectorAll('.floating-text').forEach(el => {
            const x = el.offsetLeft * scaleX;
            const y = el.offsetTop * scaleY;
            const size = parseInt(el.style.fontSize) * scaleY; // scale font
            
            finalCtx.font = `bold ${size}px Arial, sans-serif`;
            finalCtx.fillStyle = el.style.color;
            finalCtx.textBaseline = 'top';
            
            el.innerText.split('\n').forEach((line, i) => finalCtx.fillText(line, x, y + (i * size * 1.2)));
        });

        const link = document.createElement('a');
        link.download = originalFilename;
        link.href = finalCanvas.toDataURL("image/png", 1.0);
        link.click();
    });
</script>

</body>
</html>
