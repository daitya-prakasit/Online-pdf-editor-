<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASUR PDF TEXT EDITOR - HINDI SUPPORT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            font-family: 'Segoe UI', 'Arial', 'Noto Sans Devanagari', sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            background: #161b22;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e94560;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
        }

        .logo span {
            color: #e94560;
        }

        .badge {
            background: #e94560;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        .editor-panel {
            width: 350px;
            background: #161b22;
            padding: 20px;
            border-right: 1px solid #30363d;
            overflow-y: auto;
        }

        .section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #30363d;
        }

        .section-title {
            color: #e94560;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .upload-btn {
            width: 100%;
            padding: 14px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .upload-btn:hover {
            background: #2ea043;
        }

        .text-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .text-item {
            background: #21262d;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #30363d;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .text-item:hover {
            border-color: #e94560;
            background: #2d3748;
        }

        .text-item.active {
            border-color: #e94560;
            background: #1a2a4a;
        }

        .text-preview {
            font-size: 12px;
            color: #c9d1d9;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }

        .text-actions {
            display: flex;
            gap: 5px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #8b949e;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 14px;
        }

        .icon-btn:hover {
            background: #30363d;
            color: #e94560;
        }

        .edit-area {
            margin-top: 15px;
        }

        .edit-area textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 10px;
            font-family: 'Segoe UI', 'Noto Sans Devanagari', sans-serif;
        }

        .edit-area textarea:focus {
            outline: none;
            border-color: #e94560;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            flex: 1;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #ff6b6b;
        }

        .btn-secondary {
            background: #21262d;
            color: white;
            border: 1px solid #30363d;
        }

        .btn-secondary:hover {
            background: #30363d;
        }

        .color-input {
            width: 100%;
            height: 40px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #0d1117;
            cursor: pointer;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            margin-bottom: 10px;
        }

        .slider-container {
            margin-bottom: 12px;
        }

        .slider-container label {
            font-size: 12px;
            color: #8b949e;
            display: block;
            margin-bottom: 5px;
        }

        .slider-container input {
            width: 100%;
            accent-color: #e94560;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
        }

        .toolbar {
            padding: 10px 20px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .tool-btn {
            padding: 8px 16px;
            background: #21262d;
            color: white;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .tool-btn:hover {
            background: #30363d;
        }

        .tool-btn.active {
            background: #e94560;
            border-color: #e94560;
        }

        .page-controls {
            margin-left: auto;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .page-info {
            color: #e94560;
            font-weight: bold;
            margin: 0 10px;
        }

        .canvas-wrapper {
            flex: 1;
            overflow: auto;
            padding: 20px;
            display: flex;
            justify-content: center;
            background: #1a1f2a;
        }

        .canvas-container {
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            background: white;
        }

        #pdf-canvas {
            display: block;
        }

        #text-canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .action-bar {
            padding: 15px 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #161b22;
            padding: 20px 40px;
            border-radius: 10px;
            border: 2px solid #e94560;
            z-index: 1000;
            color: white;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #30363d;
            border-top: 4px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #file-input {
            display: none;
        }

        .info-message {
            color: #8b949e;
            text-align: center;
            padding: 20px;
            font-size: 13px;
        }

        .status-badge {
            display: inline-block;
            background: #238636;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 5px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <span>ASUR</span> PDF TEXT EDITOR
    </div>
    <div class="badge">HINDI + ENGLISH • PRO</div>
</div>

<div class="main-container">
    
    <div class="editor-panel">
        <div class="section">
            <div class="section-title">📁 PDF फाइल</div>
            <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                📄 PDF अपलोड करें
            </button>
            <input type="file" id="file-input" accept=".pdf" onchange="loadPDF(event)">
        </div>

        <div class="section">
            <div class="section-title">📝 टेक्स्ट लिस्ट</div>
            <button class="btn btn-secondary" onclick="extractAllText()" style="width: 100%; margin-bottom: 10px;">
                🔍 सारा टेक्स्ट निकालें
            </button>
            <div id="extract-status" style="font-size: 12px; color: #e94560; margin-bottom: 10px;"></div>
            <div class="text-list" id="text-list">
                <div class="info-message">
                    PDF अपलोड करें और "सारा टेक्स्ट निकालें" पर क्लिक करें
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">✏️ टेक्स्ट एडिट करें</div>
            <div class="edit-area">
                <label style="color: #8b949e; font-size: 12px;">सेलेक्टेड टेक्स्ट:</label>
                <textarea id="edit-textarea" placeholder="कोई टेक्स्ट सेलेक्ट नहीं है..."></textarea>
                
                <label style="color: #8b949e; font-size: 12px;">फॉन्ट साइज:</label>
                <div class="slider-container">
                    <input type="range" id="font-size-slider" min="6" max="72" value="16">
                    <span id="font-size-value" style="color: #e94560;">16</span>px
                </div>

                <label style="color: #8b949e; font-size: 12px;">टेक्स्ट कलर:</label>
                <input type="color" id="text-color" class="color-input" value="#000000">

                <label style="color: #8b949e; font-size: 12px;">फॉन्ट:</label>
                <select id="font-select">
                    <option value="Arial">Arial</option>
                    <option value="Noto Sans Devanagari">Noto Sans (हिंदी)</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Verdana">Verdana</option>
                    <option value="Impact">Impact</option>
                </select>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="updateSelectedText()">अपडेट करें</button>
                    <button class="btn btn-secondary" onclick="addNewText()">नया जोड़ें</button>
                </div>
                <button class="btn btn-secondary" onclick="deleteSelectedText()" style="margin-top: 8px; width: 100%;">
                    🗑️ सेलेक्टेड डिलीट करें
                </button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🎨 स्टाइल</div>
            <div class="btn-group" style="margin-bottom: 10px;">
                <button class="btn btn-secondary" onclick="applyBold()"><b>B</b> बोल्ड</button>
                <button class="btn btn-secondary" onclick="applyItalic()"><i>I</i> इटैलिक</button>
                <button class="btn btn-secondary" onclick="applyUnderline()"><u>U</u> अंडरलाइन</button>
            </div>
            <button class="btn btn-secondary" onclick="clearAllText()" style="width: 100%;">
                🧹 सारा टेक्स्ट हटाएं
            </button>
        </div>
    </div>

    <div class="canvas-area">
        <div class="toolbar">
            <button class="tool-btn active" id="tool-select" onclick="setTool('select')">🖱️ सेलेक्ट</button>
            <button class="tool-btn" id="tool-move" onclick="setTool('move')">✋ मूव</button>
            
            <div class="page-controls">
                <button class="tool-btn" onclick="previousPage()">◀ पिछला</button>
                <span class="page-info">
                    पेज <span id="current-page">1</span> / <span id="total-pages">1</span>
                </span>
                <button class="tool-btn" onclick="nextPage()">अगला ▶</button>
                <button class="tool-btn" onclick="zoomIn()">🔍+</button>
                <button class="tool-btn" onclick="zoomOut()">🔍-</button>
            </div>
        </div>

        <div class="canvas-wrapper">
            <div class="canvas-container" id="canvas-container">
                <canvas id="pdf-canvas"></canvas>
                <canvas id="text-canvas"></canvas>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-secondary" onclick="exportPDF()">💾 प्रीव्यू</button>
            <button class="btn btn-primary" onclick="downloadPDF()">⬇️ PDF डाउनलोड करें</button>
        </div>
    </div>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loading-text">लोड हो रहा है...</div>
</div>

<script>
    // ================================================================
    // ASUR PDF TEXT EDITOR - FIXED VERSION (HINDI + ENGLISH)
    // ================================================================

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 1;
    let scale = 1.5;
    let fabricCanvas = null;
    let textItems = [];
    let currentTool = 'select';
    let selectedTextId = null;

    // Fabric.js इनिशियलाइज़ेशन
    function initFabricCanvas(width, height) {
        const canvasElement = document.getElementById('text-canvas');
        
        if (fabricCanvas) {
            fabricCanvas.dispose();
        }
        
        fabricCanvas = new fabric.Canvas('text-canvas', {
            selection: true,
            preserveObjectStacking: true,
            width: width,
            height: height
        });

        fabricCanvas.on('selection:created', onTextSelected);
        fabricCanvas.on('selection:updated', onTextSelected);
        fabricCanvas.on('selection:cleared', onSelectionCleared);
        fabricCanvas.on('object:modified', onObjectModified);
    }

    // PDF लोड करना - फिक्स्ड
    async function loadPDF(event) {
        const file = event.target.files[0];
        if (!file) return;

        showLoading('PDF लोड हो रहा है...');
        
        const fileReader = new FileReader();
        fileReader.onload = async function(e) {
            const typedArray = new Uint8Array(e.target.result);
            
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            
            try {
                pdfDoc = await pdfjsLib.getDocument({
                    data: typedArray,
                    useSystemFonts: true,
                    standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/standard_fonts/'
                }).promise;
                
                totalPages = pdfDoc.numPages;
                document.getElementById('total-pages').textContent = totalPages;
                currentPage = 1;
                
                await renderPage(currentPage);
                
                hideLoading();
                
                // ऑटो एक्सट्रैक्ट
                setTimeout(() => {
                    extractAllText();
                }, 500);
                
            } catch (error) {
                console.error('PDF Load Error:', error);
                alert('PDF लोड करने में एरर: ' + error.message);
                hideLoading();
            }
        };
        
        fileReader.readAsArrayBuffer(file);
    }

    // PDF पेज रेंडर करना
    async function renderPage(pageNum) {
        if (!pdfDoc) return false;

        try {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: scale });
            
            const canvas = document.getElementById('pdf-canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            
            const renderContext = {
                canvasContext: context,
                viewport: viewport
            };
            
            await page.render(renderContext).promise;
            
            document.getElementById('canvas-container').style.width = viewport.width + 'px';
            document.getElementById('canvas-container').style.height = viewport.height + 'px';
            
            initFabricCanvas(viewport.width, viewport.height);
            
            document.getElementById('current-page').textContent = pageNum;
            
            loadPageTextItems();
            return true;
        } catch (error) {
            console.error('Render Error:', error);
            return false;
        }
    }

    // PDF से टेक्स्ट एक्सट्रैक्ट करना - फिक्स्ड वर्जन
    async function extractAllText() {
        if (!pdfDoc) {
            alert('पहले PDF अपलोड करें।');
            return;
        }

        showLoading('टेक्स्ट निकाला जा रहा है...');
        textItems = [];
        
        try {
            for (let i = 1; i <= totalPages; i++) {
                const page = await pdfDoc.getPage(i);
                const textContent = await page.getTextContent();
                const viewport = page.getViewport({ scale: scale });
                
                textContent.items.forEach((item, index) => {
                    if (item.str && item.str.trim().length > 0) {
                        const transform = item.transform;
                        
                        // PDF कोऑर्डिनेट्स को कैनवास कोऑर्डिनेट्स में बदलें
                        const x = transform[4] * scale;
                        const y = viewport.height - (transform[5] * scale);
                        const fontSize = Math.abs(transform[3]) * scale;
                        
                        textItems.push({
                            id: `text-${i}-${index}-${Date.now()}-${Math.random()}`,
                            page: i,
                            text: item.str,
                            x: x,
                            y: y - fontSize,
                            fontSize: fontSize || 12,
                            fontFamily: 'Noto Sans Devanagari',
                            color: '#000000',
                            fontWeight: 'normal',
                            fontStyle: 'normal',
                            underline: false
                        });
                    }
                });
            }
            
            document.getElementById('extract-status').innerHTML = 
                `✅ कुल ${textItems.length} टेक्स्ट आइटम मिले`;
            
            updateTextList();
            loadPageTextItems();
            
            hideLoading();
        } catch (error) {
            console.error('Extract Error:', error);
            document.getElementById('extract-status').innerHTML = 
                `❌ एरर: ${error.message}`;
            hideLoading();
        }
    }

    // करंट पेज के टेक्स्ट आइटम्स कैनवास पर लोड करें
    function loadPageTextItems() {
        if (!fabricCanvas) return;
        
        fabricCanvas.clear();
        
        const pageItems = textItems.filter(item => item.page === currentPage);
        
        pageItems.forEach(item => {
            const textObj = new fabric.Text(item.text, {
                left: item.x,
                top: item.y,
                fontSize: item.fontSize,
                fontFamily: item.fontFamily,
                fill: item.color,
                fontWeight: item.fontWeight,
                fontStyle: item.fontStyle,
                underline: item.underline,
                id: item.id,
                hasControls: true,
                hasBorders: true,
                lockScalingFlip: true
            });
            
            fabricCanvas.add(textObj);
        });
        
        fabricCanvas.renderAll();
        
        // काउंट अपडेट
        document.getElementById('extract-status').innerHTML = 
            `📄 पेज ${currentPage}: ${pageItems.length} टेक्स्ट आइटम`;
    }

    // टेक्स्ट लिस्ट UI अपडेट करें
    function updateTextList() {
        const listContainer = document.getElementById('text-list');
        const pageItems = textItems.filter(item => item.page === currentPage);
        
        if (pageItems.length === 0) {
            listContainer.innerHTML = '<div class="info-message">⚠️ इस पेज पर कोई टेक्स्ट नहीं मिला</div>';
            return;
        }
        
        listContainer.innerHTML = pageItems.map(item => `
            <div class="text-item ${selectedTextId === item.id ? 'active' : ''}" onclick="selectTextById('${item.id}')">
                <div class="text-preview" title="${item.text}">${item.text.substring(0, 25)}${item.text.length > 25 ? '...' : ''}</div>
                <div class="text-actions">
                    <button class="icon-btn" onclick="event.stopPropagation(); editTextById('${item.id}')" title="एडिट">✏️</button>
                    <button class="icon-btn" onclick="event.stopPropagation(); deleteTextById('${item.id}')" title="डिलीट">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    // टेक्स्ट सेलेक्शन हैंडलिंग
    function onTextSelected(e) {
        const selected = e.selected[0];
        if (selected && selected.id) {
            selectedTextId = selected.id;
            const textItem = textItems.find(item => item.id === selected.id);
            if (textItem) {
                document.getElementById('edit-textarea').value = textItem.text;
                document.getElementById('font-size-slider').value = textItem.fontSize;
                document.getElementById('font-size-value').textContent = Math.round(textItem.fontSize);
                document.getElementById('text-color').value = textItem.color;
                document.getElementById('font-select').value = textItem.fontFamily;
            }
            updateTextList();
        }
    }

    function onSelectionCleared() {
        selectedTextId = null;
        document.getElementById('edit-textarea').value = '';
        updateTextList();
    }

    function onObjectModified(e) {
        const obj = e.target;
        if (obj && obj.id) {
            const textItem = textItems.find(item => item.id === obj.id);
            if (textItem) {
                textItem.x = obj.left;
                textItem.y = obj.top;
                textItem.text = obj.text;
                textItem.fontSize = obj.fontSize;
                textItem.color = obj.fill;
                textItem.fontFamily = obj.fontFamily;
            }
        }
    }

    // टेक्स्ट सेलेक्ट करें ID से
    function selectTextById(id) {
        selectedTextId = id;
        
        fabricCanvas.getObjects().forEach(obj => {
            if (obj.id === id) {
                fabricCanvas.setActiveObject(obj);
                obj.setCoords();
            }
        });
        
        const textItem = textItems.find(item => item.id === id);
        if (textItem) {
            document.getElementById('edit-textarea').value = textItem.text;
            document.getElementById('font-size-slider').value = textItem.fontSize;
            document.getElementById('font-size-value').textContent = Math.round(textItem.fontSize);
            document.getElementById('text-color').value = textItem.color;
            document.getElementById('font-select').value = textItem.fontFamily;
        }
        
        updateTextList();
        fabricCanvas.renderAll();
    }

    // सेलेक्टेड टेक्स्ट अपडेट करें
    function updateSelectedText() {
        if (!selectedTextId) {
            alert('पहले कोई टेक्स्ट सेलेक्ट करें।');
            return;
        }
        
        const newText = document.getElementById('edit-textarea').value;
        const newFontSize = parseInt(document.getElementById('font-size-slider').value);
        const newColor = document.getElementById('text-color').value;
        const newFont = document.getElementById('font-select').value;
        
        const textItem = textItems.find(item => item.id === selectedTextId);
        if (textItem) {
            textItem.text = newText;
            textItem.fontSize = newFontSize;
            textItem.color = newColor;
            textItem.fontFamily = newFont;
        }
        
        const activeObj = fabricCanvas.getActiveObject();
        if (activeObj) {
            activeObj.set({
                text: newText,
                fontSize: newFontSize,
                fill: newColor,
                fontFamily: newFont
            });
            fabricCanvas.renderAll();
        }
        
        updateTextList();
    }

    // नया टेक्स्ट जोड़ें
    function addNewText() {
        const newId = `text-new-${Date.now()}-${Math.random()}`;
        const newText = document.getElementById('edit-textarea').value || 'नया टेक्स्ट';
        const fontSize = parseInt(document.getElementById('font-size-slider').value);
        const color = document.getElementById('text-color').value;
        const font = document.getElementById('font-select').value;
        
        const canvasCenter = fabricCanvas.getCenter();
        
        const textItem = {
            id: newId,
            page: currentPage,
            text: newText,
            x: canvasCenter.left,
            y: canvasCenter.top,
            fontSize: fontSize,
            fontFamily: font,
            color: color,
            fontWeight: 'normal',
            fontStyle: 'normal',
            underline: false
        };
        
        textItems.push(textItem);
        
        const textObj = new fabric.Text(newText, {
            left: canvasCenter.left,
            top: canvasCenter.top,
            fontSize: fontSize,
            fontFamily: font,
            fill: color,
            id: newId,
            hasControls: true,
            hasBorders: true
        });
        
        fabricCanvas.add(textObj);
        fabricCanvas.setActiveObject(textObj);
        fabricCanvas.renderAll();
        
        selectedTextId = newId;
        updateTextList();
        updateSelectedText();
    }

    function deleteSelectedText() {
        if (!selectedTextId) {
            alert('पहले कोई टेक्स्ट सेलेक्ट करें।');
            return;
        }
        
        deleteTextById(selectedTextId);
    }

    function deleteTextById(id) {
        textItems = textItems.filter(item => item.id !== id);
        
        fabricCanvas.getObjects().forEach(obj => {
            if (obj.id === id) {
                fabricCanvas.remove(obj);
            }
        });
        
        fabricCanvas.renderAll();
        selectedTextId = null;
        document.getElementById('edit-textarea').value = '';
        updateTextList();
        
        const pageItems = textItems.filter(item => item.page === currentPage);
        document.getElementById('extract-status').innerHTML = 
            `📄 पेज ${currentPage}: ${pageItems.length} टेक्स्ट आइटम`;
    }

    function editTextById(id) {
        selectTextById(id);
    }

    function applyBold() {
        const activeObj = fabricCanvas.getActiveObject();
        if (activeObj && activeObj.type === 'text') {
            const newWeight = activeObj.fontWeight === 'bold' ? 'normal' : 'bold';
            activeObj.set('fontWeight', newWeight);
            
            const textItem = textItems.find(item => item.id === activeObj.id);
            if (textItem) textItem.fontWeight = newWeight;
            
            fabricCanvas.renderAll();
        }
    }

    function applyItalic() {
        const activeObj = fabricCanvas.getActiveObject();
        if (activeObj && activeObj.type === 'text') {
            const newStyle = activeObj.fontStyle === 'italic' ? 'normal' : 'italic';
            activeObj.set('fontStyle', newStyle);
            
            const textItem = textItems.find(item => item.id === activeObj.id);
            if (textItem) textItem.fontStyle = newStyle;
            
            fabricCanvas.renderAll();
        }
    }

    function applyUnderline() {
        const activeObj = fabricCanvas.getActiveObject();
        if (activeObj && activeObj.type === 'text') {
            activeObj.set('underline', !activeObj.underline);
            
            const textItem = textItems.find(item => item.id === activeObj.id);
            if (textItem) textItem.underline = !textItem.underline;
            
            fabricCanvas.renderAll();
        }
    }

    function clearAllText() {
        if (confirm('इस पेज का सारा टेक्स्ट डिलीट करना है?')) {
            textItems = textItems.filter(item => item.page !== currentPage);
            fabricCanvas.clear();
            selectedTextId = null;
            document.getElementById('edit-textarea').value = '';
            updateTextList();
            document.getElementById('extract-status').innerHTML = `📄 पेज ${currentPage}: 0 टेक्स्ट आइटम`;
        }
    }

    function setTool(tool) {
        currentTool = tool;
        
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        document.getElementById(`tool-${tool}`).classList.add('active');
        
        if (tool === 'select') {
            fabricCanvas.selection = true;
            fabricCanvas.forEachObject(obj => obj.set('selectable', true));
        } else if (tool === 'move') {
            fabricCanvas.selection = false;
        }
    }

    async function previousPage() {
        if (currentPage > 1) {
            currentPage--;
            await renderPage(currentPage);
        }
    }

    async function nextPage() {
        if (currentPage < totalPages) {
            currentPage++;
            await renderPage(currentPage);
        }
    }

    function zoomIn() {
        scale += 0.25;
        renderPage(currentPage);
    }

    function zoomOut() {
        if (scale > 0.5) {
            scale -= 0.25;
            renderPage(currentPage);
        }
    }

    async function exportPDF() {
        if (!pdfDoc) {
            alert('पहले PDF लोड करें।');
            return;
        }
        
        showLoading('PDF बन रही है...');
        
        try {
            const { jsPDF } = window.jspdf;
            const canvas = document.getElementById('pdf-canvas');
            const textCanvas = document.getElementById('text-canvas');
            
            const combinedCanvas = document.createElement('canvas');
            combinedCanvas.width = canvas.width;
            combinedCanvas.height = canvas.height;
            const ctx = combinedCanvas.getContext('2d');
            
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, combinedCanvas.width, combinedCanvas.height);
            
            ctx.drawImage(canvas, 0, 0);
            ctx.drawImage(textCanvas, 0, 0);
            
            const pdf = new jsPDF({
                orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
                unit: 'px',
                format: [canvas.width, canvas.height]
            });
            
            pdf.addImage(combinedCanvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, canvas.width, canvas.height);
            
            pdf.save('asur_edited_hindi.pdf');
            hideLoading();
        } catch (error) {
            console.error('Export Error:', error);
            alert('एक्सपोर्ट में एरर: ' + error.message);
            hideLoading();
        }
    }

    async function downloadPDF() {
        await exportPDF();
    }

    function showLoading(text = 'लोड हो रहा है...') {
        document.getElementById('loading-text').textContent = text;
        document.getElementById('loading').style.display = 'block';
    }

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }

    document.getElementById('font-size-slider').addEventListener('input', function() {
        document.getElementById('font-size-value').textContent = this.value;
    });
