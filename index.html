<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITYA - Multi-Language PDF Editor</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js"></script>
    <style>
        :root { --bg: #070707; --panel: #141414; --accent: #00ff88; --text: #d4d4d4; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: var(--panel); padding: 25px; border: 1px solid #222; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
        h1 { color: var(--accent); text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0;}
        .tool-section { background: #0a0a0a; padding: 15px; margin-top: 15px; border-left: 3px solid var(--accent); border-radius: 4px; }
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        input[type="number"], input[type="text"], input[type="file"] { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 4px; font-family: inherit; }
        button { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; transition: 0.2s; font-family: inherit; }
        button:hover { background: #00cc6a; color: white; }
        button:disabled { background: #222; color: #555; cursor: not-allowed; }
        #status { color: #ffcc00; font-weight: bold; margin-top: 10px; font-size: 14px;}
        iframe { width: 100%; height: 600px; margin-top: 20px; background: #fff; border: none; border-radius: 4px; }
        .help-text { font-size: 12px; color: #777; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ DAITYA ] - HINDI & ENGLISH PDF EDITOR</h1>
        
        <input type="file" id="uploadPdf" accept="application/pdf" />
        <p id="status">> SYSTEM: Waiting for target PDF...</p>

        <div class="tool-section">
            <h3>Mask Old Text & Inject New (Hindi/Eng)</h3>
            <span class="help-text">Set X,Y coordinates to cover the old text with a white mask, then type your Hindi or English text.</span>
            
            <div class="input-group">
                <input type="number" id="posX" placeholder="X Coord (e.g. 100)" value="100">
                <input type="number" id="posY" placeholder="Y Coord (e.g. 500)" value="500">
                <input type="number" id="boxW" placeholder="Mask Width (e.g. 150)" value="150">
                <input type="number" id="boxH" placeholder="Mask Height (e.g. 20)" value="20">
            </div>
            <div class="input-group">
                <input type="text" id="newText" placeholder="नया टेक्स्ट यहाँ लिखें / Enter New Text" style="flex: 1;" value="DAITYA द्वारा हैक किया गया">
                <input type="number" id="fontSize" placeholder="Font Size" value="14" style="width: 80px;">
                <button id="btnReplace" onclick="maskAndReplace()" disabled>INJECT TEXT</button>
            </div>
        </div>

        <button id="btnDownload" onclick="downloadPdf()" disabled style="width: 100%; margin-top: 15px; background: #0088ff; color: white;">DOWNLOAD MODIFIED PDF</button>

        <iframe id="pdfViewer"></iframe>
    </div>

    <script>
        let currentPdfBytes = null;
        let hindiFontBytes = null;
        const { PDFDocument, rgb } = PDFLib;

        // Fetching a Hindi Supported Font (Hind) from Google Fonts repo directly
        async function loadHindiFont() {
            try {
                document.getElementById('status').innerText = '> SYSTEM: Downloading Hindi Language Module...';
                const url = 'https://raw.githubusercontent.com/google/fonts/main/ofl/hind/Hind-Regular.ttf';
                const response = await fetch(url);
                hindiFontBytes = await response.arrayBuffer();
                document.getElementById('status').innerText = '> SYSTEM: Hindi Font loaded. Ready for PDF.';
            } catch (err) {
                document.getElementById('status').innerText = '> ERROR: Failed to load Hindi font. ' + err.message;
            }
        }

        // Initialize Font load on page start
        window.onload = loadHindiFont;

        // Load Uploaded PDF
        document.getElementById('uploadPdf').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('status').innerText = '> SYSTEM: Injecting PDF into memory...';
                currentPdfBytes = await file.arrayBuffer();
                document.getElementById('btnReplace').disabled = false;
                document.getElementById('btnDownload').disabled = false;
                document.getElementById('status').innerText = '> SYSTEM: PDF Loaded. Set coordinates and Inject.';
                displayPdf(currentPdfBytes);
            }
        });

        // The Bypass: Mask old text + Write Hindi/English text
        async function maskAndReplace() {
            if (!currentPdfBytes || !hindiFontBytes) {
                alert("Wait for font and PDF to load!");
                return;
            }

            try {
                document.getElementById('status').innerText = '> SYSTEM: Applying Mask and Custom Font...';
                
                const pdfDoc = await PDFDocument.load(currentPdfBytes);
                
                // Register Fontkit for Custom TTF loading
                pdfDoc.registerFontkit(window.fontkit);
                
                // Embed the downloaded Hindi font
                const customFont = await pdfDoc.embedFont(hindiFontBytes);
                
                const pages = pdfDoc.getPages();
                const targetPage = pages[0]; // Edits Page 1
                
                // Get inputs
                const x = parseFloat(document.getElementById('posX').value);
                const y = parseFloat(document.getElementById('posY').value);
                const w = parseFloat(document.getElementById('boxW').value);
                const h = parseFloat(document.getElementById('boxH').value);
                const text = document.getElementById('newText').value;
                const fSize = parseFloat(document.getElementById('fontSize').value);

                // Step 1: Draw White Mask to hide old text
                targetPage.drawRectangle({
                    x: x, y: y, width: w, height: h, color: rgb(1, 1, 1),
                });

                // Step 2: Draw New Text (Hindi/Eng) using embedded custom font
                targetPage.drawText(text, {
                    x: x + 2, 
                    y: y + 4, 
                    size: fSize,
                    font: customFont,
                    color: rgb(0, 0, 0), // Black text
                });

                currentPdfBytes = await pdfDoc.save();
                document.getElementById('status').innerText = '> SUCCESS: Text Replashed (Hindi/Eng supported).';
                displayPdf(currentPdfBytes);
            } catch (err) {
                document.getElementById('status').innerText = '> ERROR: ' + err.message;
            }
        }

        function downloadPdf() {
            if (!currentPdfBytes) return;
            const blob = new Blob([currentPdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "Daitya_Hindi_Edited.pdf";
            link.click();
            document.getElementById('status').innerText = '> SYSTEM: PDF Output Extracted.';
        }

        function displayPdf(pdfBytes) {
            const blob = new Blob([currentPdfBytes], { type: "application/pdf" });
            document.getElementById('pdfViewer').src = URL.createObjectURL(blob);
        }
    </script>
</body>
</html>
