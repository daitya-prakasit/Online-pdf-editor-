<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASUR PDF SELECT & OCR - SELECTED AREA ONLY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0e14;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            background: #111820;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff4444;
        }

        .logo { font-size: 24px; font-weight: 900; }
        .logo span { color: #ff4444; }
        .badge { background: #ff4444; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        .main-container { display: flex; height: calc(100vh - 60px); }

        .editor-panel {
            width: 380px;
            background: #111820;
            padding: 20px;
            border-right: 1px solid #2a3545;
            overflow-y: auto;
        }

        .section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a3545;
        }

        .section-title {
            color: #ff4444;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .upload-btn {
            width: 100%;
            padding: 14px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .upload-btn:hover { background: #ff6666; }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .btn-primary {
            background: #ff4444;
            color: white;
            width: 100%;
        }

        .btn-secondary {
            background: #1e2a3a;
            color: white;
            border: 1px solid #2a3545;
            width: 100%;
            margin-bottom: 8px;
        }

        .btn-success {
            background: #238636;
            color: white;
            width: 100%;
            margin-bottom: 8px;
        }

        .btn-success:hover { background: #2ea043; }

        .btn-secondary:hover { background: #2a3545; }

        .text-list {
            max-height: 250px;
            overflow-y: auto;
            margin: 10px 0;
        }

        .text-item {
            background: #1a2535;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #2a3545;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }

        .text-item:hover { border-color: #ff4444; background: #1e2a3a; }
        .text-item.active { border-color: #ff4444; background: #2a1a2a; }

        .text-preview {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 240px;
        }

        .edit-area textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            background: #0d121a;
            border: 1px solid #2a3545;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 10px;
        }

        .edit-area textarea:focus { outline: none; border-color: #ff4444; }

        .color-input {
            width: 100%;
            height: 40px;
            border: 1px solid #2a3545;
            border-radius: 6px;
            background: #0d121a;
            cursor: pointer;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 10px;
            background: #0d121a;
            border: 1px solid #2a3545;
            border-radius: 6px;
            color: white;
            margin-bottom: 10px;
        }

        .slider-container { margin-bottom: 12px; }
        .slider-container label { font-size: 12px; color: #8899aa; display: block; margin-bottom: 5px; }
        .slider-container input { width: 100%; accent-color: #ff4444; }

        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0e14;
        }

        .toolbar {
            padding: 10px 20px;
            background: #111820;
            border-bottom: 1px solid #2a3545;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .tool-btn {
            padding: 8px 16px;
            background: #1e2a3a;
            color: white;
            border: 1px solid #2a3545;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .tool-btn:hover { background: #2a3545; }
        .tool-btn.active { background: #ff4444; border-color: #ff4444; }
        .tool-btn.ocr-mode { background: #238636; border-color: #238636; }

        .page-controls {
            margin-left: auto;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .page-info { color: #ff4444; font-weight: bold; margin: 0 10px; }

        .canvas-wrapper {
            flex: 1;
            overflow: auto;
            padding: 20px;
            display: flex;
            justify-content: center;
            background: #151e28;
        }

        .canvas-container {
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            background: white;
        }

        #pdf-canvas { display: block; }
        #text-canvas { position: absolute; top: 0; left: 0; }
        #selection-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }

        .action-bar {
            padding: 15px 20px;
            background: #111820;
            border-top: 1px solid #2a3545;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111820;
            padding: 30px 50px;
            border-radius: 10px;
            border: 2px solid #ff4444;
            z-index: 1000;
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #2a3545;
            border-top: 5px solid #ff4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #file-input { display: none; }
        .info-message { color: #8899aa; text-align: center; padding: 20px; font-size: 13px; }
        .status { color: #ff4444; font-size: 12px; margin: 5px 0; }
        
        .selection-info {
            background: #1a2535;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 12px;
            border-left: 3px solid #ff4444;
        }

        .coords-display {
            color: #8899aa;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo"><span>ASUR</span> SELECT & OCR</div>
    <div class="badge">SELECT AREA → OCR → EDIT</div>
</div>

<div class="main-container">
    <div class="editor-panel">
        <div class="section">
            <div class="section-title">📁 PDF फाइल</div>
            <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                📄 PDF अपलोड करें
            </button>
            <input type="file" id="file-input" accept=".pdf" onchange="loadPDF(event)">
        </div>

        <div class="section">
            <div class="section-title">🎯 सेलेक्शन टूल</div>
            <div class="selection-info" id="selection-info">
                <div>📐 सेलेक्टेड एरिया:</div>
                <div class="coords-display" id="coords-display">कोई एरिया सेलेक्ट नहीं</div>
            </div>
            <button class="btn btn-success" onclick="runOCROnSelection()">
                🔍 सेलेक्टेड एरिया का OCR करें
            </button>
            <button class="btn btn-secondary" onclick="clearSelection()">
                ❌ सेलेक्शन क्लियर करें
            </button>
            <div class="status" id="ocr-status"></div>
        </div>

        <div class="section">
            <div class="section-title">📝 OCR से निकले टेक्स्ट</div>
            <div class="text-list" id="text-list">
                <div class="info-message">एरिया सेलेक्ट करें और OCR चलाएं</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">✏️ टेक्स्ट एडिट करें</div>
            <div class="edit-area">
                <textarea id="edit-textarea" placeholder="कोई टेक्स्ट सेलेक्ट नहीं..."></textarea>
                
                <label style="color: #8899aa; font-size: 12px;">फॉन्ट साइज:</label>
                <div class="slider-container">
                    <input type="range" id="font-size-slider" min="6" max="72" value="16">
                    <span id="font-size-value" style="color: #ff4444;">16</span>px
                </div>

                <label style="color: #8899aa; font-size: 12px;">कलर:</label>
                <input type="color" id="text-color" class="color-input" value="#000000">

                <label style="color: #8899aa; font-size: 12px;">फॉन्ट:</label>
                <select id="font-select">
                    <option value="Arial">Arial</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Verdana">Verdana</option>
                </select>

                <button class="btn btn-primary" onclick="updateSelectedText()" style="margin-bottom: 8px;">अपडेट करें</button>
                <button class="btn btn-secondary" onclick="addNewText()">➕ नया टेक्स्ट जोड़ें</button>
                <button class="btn btn-secondary" onclick="deleteSelectedText()">🗑️ डिलीट करें</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🎨 स्टाइल</div>
            <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                <button class="btn btn-secondary" onclick="applyBold()" style="width: auto; padding: 8px 15px;"><b>B</b></button>
                <button class="btn btn-secondary" onclick="applyItalic()" style="width: auto; padding: 8px 15px;"><i>I</i></button>
                <button class="btn btn-secondary" onclick="applyUnderline()" style="width: auto; padding: 8px 15px;"><u>U</u></button>
            </div>
            <button class="btn btn-secondary" onclick="clearAllText()">🧹 सारा टेक्स्ट हटाएं</button>
        </div>
    </div>

    <div class="canvas-area">
        <div class="toolbar">
            <button class="tool-btn active" id="tool-select" onclick="setTool('select')">🖱️ सेलेक्ट/मूव</button>
            <button class="tool-btn" id="tool-selection" onclick="setTool('selection')">🔲 एरिया सेलेक्ट करें</button>
            
            <div class="page-controls">
                <button class="tool-btn" onclick="previousPage()">◀ पिछला</button>
                <span class="page-info">पेज <span id="current-page">1</span>/<span id="total-pages">1</span></span>
                <button class="tool-btn" onclick="nextPage()">अगला ▶</button>
                <button class="tool-btn" onclick="zoomIn()">🔍+</button>
                <button class="tool-btn" onclick="zoomOut()">🔍-</button>
            </div>
        </div>

        <div class="canvas-wrapper">
            <div class="canvas-container" id="canvas-container">
                <canvas id="pdf-canvas"></canvas>
                <canvas id="text-canvas"></canvas>
                <canvas id="selection-canvas"></canvas>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-secondary" onclick="exportPDF()" style="width: auto;">💾 प्रीव्यू</button>
            <button class="btn btn-primary" onclick="downloadPDF()" style="width: auto;">⬇️ डाउनलोड</button>
        </div>
    </div>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loading-text">लोड हो रहा है...</div>
</div>

<script>
    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 1;
    let scale = 1.5;
    let fabricCanvas = null;
    let textItems = [];
    let currentTool = 'select';
    let selectedTextId = null;
    let currentPDFData = null;
    
    // सेलेक्शन वेरिएबल्स
    let isSelecting = false;
    let selectionStart = { x: 0, y: 0 };
    let selectionEnd = { x: 0, y: 0 };
    let selectionRect = { x: 0, y: 0, width: 0, height: 0 };
    let hasSelection = false;

    function initFabricCanvas(width, height) {
        if (fabricCanvas) fabricCanvas.dispose();
        
        fabricCanvas = new fabric.Canvas('text-canvas', {
            selection: true,
            preserveObjectStacking: true,
            width: width,
            height: height
        });

        fabricCanvas.on('selection:created', onTextSelected);
        fabricCanvas.on('selection:updated', onTextSelected);
        fabricCanvas.on('selection:cleared', onSelectionCleared);
        fabricCanvas.on('object:modified', onObjectModified);
        
        // सेलेक्शन कैनवास भी सेट करें
        const selCanvas = document.getElementById('selection-canvas');
        selCanvas.width = width;
        selCanvas.height = height;
        
        // माउस इवेंट्स
        const container = document.getElementById('canvas-container');
        container.addEventListener('mousedown', onMouseDown);
        container.addEventListener('mousemove', onMouseMove);
        container.addEventListener('mouseup', onMouseUp);
    }

    async function loadPDF(event) {
        const file = event.target.files[0];
        if (!file) return;

        showLoading('PDF लोड हो रहा है...');
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            currentPDFData = new Uint8Array(e.target.result);
            
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            
            try {
                pdfDoc = await pdfjsLib.getDocument({ data: currentPDFData }).promise;
                totalPages = pdfDoc.numPages;
                document.getElementById('total-pages').textContent = totalPages;
                currentPage = 1;
                
                await renderPage(currentPage);
                hideLoading();
                
                document.getElementById('ocr-status').innerHTML = '✅ PDF लोड। "एरिया सेलेक्ट करें" टूल चुनें।';
            } catch (error) {
                console.error('Error:', error);
                alert('PDF लोड नहीं हुई: ' + error.message);
                hideLoading();
            }
        };
        
        reader.readAsArrayBuffer(file);
    }

    async function renderPage(pageNum) {
        if (!pdfDoc) return false;

        const page = await pdfDoc.getPage(pageNum);
        const viewport = page.getViewport({ scale: scale });
        
        const canvas = document.getElementById('pdf-canvas');
        const context = canvas.getContext('2d');
        
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        
        document.getElementById('canvas-container').style.width = viewport.width + 'px';
        document.getElementById('canvas-container').style.height = viewport.height + 'px';
        
        initFabricCanvas(viewport.width, viewport.height);
        document.getElementById('current-page').textContent = pageNum;
        
        loadPageTextItems();
        clearSelection();
        return true;
    }

    // सेलेक्शन इवेंट्स
    function onMouseDown(e) {
        if (currentTool !== 'selection') return;
        
        const rect = e.target.getBoundingClientRect();
        const scaleX = e.target.width / rect.width;
        const scaleY = e.target.height / rect.height;
        
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        
        isSelecting = true;
        selectionStart = { x, y };
        selectionEnd = { x, y };
        hasSelection = false;
    }

    function onMouseMove(e) {
        if (!isSelecting || currentTool !== 'selection') return;
        
        const rect = e.target.getBoundingClientRect();
        const scaleX = e.target.width / rect.width;
        const scaleY = e.target.height / rect.height;
        
        selectionEnd = {
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY
        };
        
        drawSelectionRect();
    }

    function onMouseUp(e) {
        if (!isSelecting || currentTool !== 'selection') return;
        
        const rect = e.target.getBoundingClientRect();
        const scaleX = e.target.width / rect.width;
        const scaleY = e.target.height / rect.height;
        
        selectionEnd = {
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY
        };
        
        isSelecting = false;
        
        // सेलेक्शन रेक्टेंगल सेट करें
        const x = Math.min(selectionStart.x, selectionEnd.x);
        const y = Math.min(selectionStart.y, selectionEnd.y);
        const width = Math.abs(selectionEnd.x - selectionStart.x);
        const height = Math.abs(selectionEnd.y - selectionStart.y);
        
        if (width > 5 && height > 5) {
            selectionRect = { x, y, width, height };
            hasSelection = true;
            
            document.getElementById('coords-display').innerHTML = 
                `X: ${Math.round(x)}, Y: ${Math.round(y)} | W: ${Math.round(width)}, H: ${Math.round(height)}`;
            document.getElementById('ocr-status').innerHTML = 
                `✅ एरिया सेलेक्ट हुआ। अब OCR चलाएं।`;
        } else {
            hasSelection = false;
            document.getElementById('coords-display').innerHTML = 'कोई एरिया सेलेक्ट नहीं';
        }
        
        drawSelectionRect();
    }

    function drawSelectionRect() {
        const canvas = document.getElementById('selection-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (!isSelecting && !hasSelection) return;
        
        let x, y, width, height;
        
        if (isSelecting) {
            x = Math.min(selectionStart.x, selectionEnd.x);
            y = Math.min(selectionStart.y, selectionEnd.y);
            width = Math.abs(selectionEnd.x - selectionStart.x);
            height = Math.abs(selectionEnd.y - selectionStart.y);
        } else {
            x = selectionRect.x;
            y = selectionRect.y;
            width = selectionRect.width;
            height = selectionRect.height;
        }
        
        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.strokeRect(x, y, width, height);
        
        ctx.fillStyle = 'rgba(255, 68, 68, 0.1)';
        ctx.fillRect(x, y, width, height);
    }

    function clearSelection() {
        hasSelection = false;
        selectionRect = { x: 0, y: 0, width: 0, height: 0 };
        
        const canvas = document.getElementById('selection-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        document.getElementById('coords-display').innerHTML = 'कोई एरिया सेलेक्ट नहीं';
    }

    // सेलेक्टेड एरिया पर OCR चलाएं
    async function runOCROnSelection() {
        if (!hasSelection) {
            alert('पहले कोई एरिया सेलेक्ट करें! "एरिया सेलेक्ट करें" टूल से ड्रैग करें।');
            return;
        }
        
        if (!pdfDoc) {
            alert('पहले PDF अपलोड करें।');
            return;
        }

        showLoading('सेलेक्टेड एरिया का OCR हो रहा है...');
        document.getElementById('ocr-status').innerHTML = '⏳ OCR चल रहा है...';
        
        try {
            const page = await pdfDoc.getPage(currentPage);
            
            // OCR के लिए हाई रेजॉल्यूशन स्केल
            const ocrScale = 3.0;
            const viewport = page.getViewport({ scale: ocrScale });
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            
            await page.render({ canvasContext: context, viewport: viewport }).promise;
            
            // सेलेक्टेड एरिया क्रॉप करें
            const scaleRatio = ocrScale / scale;
            const cropX = selectionRect.x * scaleRatio;
            const cropY = selectionRect.y * scaleRatio;
            const cropWidth = selectionRect.width * scaleRatio;
            const cropHeight = selectionRect.height * scaleRatio;
            
            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = cropWidth;
            cropCanvas.height = cropHeight;
            const cropCtx = cropCanvas.getContext('2d');
            
            cropCtx.drawImage(canvas, cropX, cropY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
            
            // Tesseract OCR
            const result = await Tesseract.recognize(cropCanvas, 'eng+hin', {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        document.getElementById('ocr-status').innerHTML = 
                            `⏳ OCR: ${Math.round(m.progress * 100)}%`;
                    }
                }
            });
            
            const extractedText = result.data.text.trim();
            
            if (extractedText) {
                // नया टेक्स्ट आइटम बनाएं
                const newId = `ocr-${Date.now()}`;
                const textItem = {
                    id: newId,
                    page: currentPage,
                    text: extractedText,
                    x: selectionRect.x + selectionRect.width / 2,
                    y: selectionRect.y + selectionRect.height / 2,
                    fontSize: 16,
                    fontFamily: 'Arial',
                    color: '#000000',
                    fontWeight: 'normal',
                    fontStyle: 'normal',
                    underline: false
                };
                
                textItems.push(textItem);
                
                // कैनवास पर जोड़ें
                const textObj = new fabric.Text(extractedText, {
                    left: textItem.x,
                    top: textItem.y,
                    fontSize: 16,
                    fontFamily: 'Arial',
                    fill: '#000000',
                    id: newId
                });
                
                fabricCanvas.add(textObj);
                fabricCanvas.setActiveObject(textObj);
                fabricCanvas.renderAll();
                
                selectedTextId = newId;
                document.getElementById('edit-textarea').value = extractedText;
                
                updateTextList();
                
                document.getElementById('ocr-status').innerHTML = 
                    `✅ OCR सक्सेस! "${extractedText.substring(0, 30)}..." निकला।`;
            } else {
                document.getElementById('ocr-status').innerHTML = '⚠️ सेलेक्टेड एरिया में कोई टेक्स्ट नहीं मिला।';
            }
            
            hideLoading();
            
        } catch (error) {
            console.error('OCR Error:', error);
            document.getElementById('ocr-status').innerHTML = '❌ OCR फेल: ' + error.message;
            hideLoading();
        }
    }

    function loadPageTextItems() {
        if (!fabricCanvas) return;
        fabricCanvas.clear();
        
        const pageItems = textItems.filter(item => item.page === currentPage);
        
        pageItems.forEach(item => {
            const textObj = new fabric.Text(item.text, {
                left: item.x,
                top: item.y,
                fontSize: item.fontSize,
                fontFamily: item.fontFamily,
                fill: item.color,
                fontWeight: item.fontWeight,
                fontStyle: item.fontStyle,
                underline: item.underline,
                id: item.id
            });
            
            fabricCanvas.add(textObj);
        });
        
        fabricCanvas.renderAll();
    }

    function updateTextList() {
        const listContainer = document.getElementById('text-list');
        const pageItems = textItems.filter(item => item.page === currentPage);
        
        if (pageItems.length === 0) {
            listContainer.innerHTML = '<div class="info-message">⚠️ इस पेज पर कोई टेक्स्ट नहीं</div>';
            return;
        }
        
        listContainer.innerHTML = pageItems.slice(0, 30).map(item => `
            <div class="text-item ${selectedTextId === item.id ? 'active' : ''}" onclick="selectTextById('${item.id}')">
                <span class="text-preview">${item.text.substring(0, 35)}</span>
                <span style="color: #ff4444; font-size: 11px;">✏️</span>
            </div>
        `).join('');
    }

    function onTextSelected(e) {
        const selected = e.selected[0];
        if (selected && selected.id) {
            selectedTextId = selected.id;
            const item = textItems.find(t => t.id === selected.id);
            if (item) {
                document.getElementById('edit-textarea').value = item.text;
                document.getElementById('font-size-slider').value = item.fontSize;
                document.getElementById('font-size-value').textContent = Math.round(item.fontSize);
                document.getElementById('text-color').value = item.color;
            }
            updateTextList();
        }
    }

    function onSelectionCleared() {
        selectedTextId = null;
        document.getElementById('edit-textarea').value = '';
        updateTextList();
    }

    function onObjectModified(e) {
        const obj = e.target;
        if (obj && obj.id) {
            const item = textItems.find(t => t.id === obj.id);
            if (item) {
                item.x = obj.left;
                item.y = obj.top;
                item.text = obj.text;
                item.fontSize = obj.fontSize;
                item.color = obj.fill;
            }
        }
    }

    function selectTextById(id) {
        selectedTextId = id;
        fabricCanvas.getObjects().forEach(obj => {
            if (obj.id === id) {
                fabricCanvas.setActiveObject(obj);
                obj.setCoords();
            }
        });
        
        const item = textItems.find(t => t.id === id);
        if (item) {
            document.getElementById('edit-textarea').value = item.text;
            document.getElementById('font-size-slider').value = item.fontSize;
            document.getElementById('font-size-value').textContent = Math.round(item.fontSize);
            document.getElementById('text-color').value = item.color;
        }
        
        updateTextList();
        fabricCanvas.renderAll();
    }

    function updateSelectedText() {
        if (!selectedTextId) { alert('पहले टेक्स्ट सेलेक्ट करें।'); return; }
        
        const newText = document.getElementById('edit-textarea').value;
        const newFontSize = parseInt(document.getElementById('font-size-slider').value);
        const newColor = document.getElementById('text-color').value;
        const newFont = document.getElementById('font-select').value;
        
        const item = textItems.find(t => t.id === selectedTextId);
        if (item) {
            item.text = newText;
            item.fontSize = newFontSize;
            item.color = newColor;
            item.fontFamily = newFont;
        }
        
        const activeObj = fabricCanvas.getActiveObject();
        if (activeObj) {
            activeObj.set({ text: newText, fontSize: newFontSize, fill: newColor, fontFamily: newFont });
            fabricCanvas.renderAll();
        }
        
        updateTextList();
    }

    function addNewText() {
        const newId = `new-${Date.now()}`;
        const newText = document.getElementById('edit-textarea').value || 'नया टेक्स्ट';
        const fontSize = parseInt(document.getElementById('font-size-slider').value);
        const color = document.getElementById('text-color').value;
        const font = document.getElementById('font-select').value;
        const center = fabricCanvas.getCenter();
        
        const item = {
            id: newId, page: currentPage, text: newText,
            x: center.left, y: center.top, fontSize: fontSize,
            fontFamily: font, color: color,
            fontWeight: 'normal', fontStyle: 'normal', underline: false
        };
        
        textItems.push(item);
        
        const textObj = new fabric.Text(newText, {
            left: center.left, top: center.top, fontSize: fontSize,
            fontFamily: font, fill: color, id: newId
        });
        
        fabricCanvas.add(textObj);
        fabricCanvas.setActiveObject(textObj);
        fabricCanvas.renderAll();
        
        selectedTextId = newId;
        updateTextList();
    }

    function deleteSelectedText() {
        if (!selectedTextId) { alert('पहले टेक्स्ट सेलेक्ट करें।'); return; }
        
        textItems = textItems.filter(t => t.id !== selectedTextId);
        
        fabricCanvas.getObjects().forEach(obj => {
            if (obj.id === selectedTextId) fabricCanvas.remove(obj);
        });
        
        fabricCanvas.renderAll();
        selectedTextId = null;
        document.getElementById('edit-textarea').value = '';
        updateTextList();
    }

    function applyBold() {
        const obj = fabricCanvas.getActiveObject();
        if (obj) { obj.set('fontWeight', obj.fontWeight === 'bold' ? 'normal' : 'bold'); fabricCanvas.renderAll(); }
    }

    function applyItalic() {
        const obj = fabricCanvas.getActiveObject();
        if (obj) { obj.set('fontStyle', obj.fontStyle === 'italic' ? 'normal' : 'italic'); fabricCanvas.renderAll(); }
    }

    function applyUnderline() {
        const obj = fabricCanvas.getActiveObject();
        if (obj) { obj.set('underline', !obj.underline); fabricCanvas.renderAll(); }
    }

    function clearAllText() {
        if (confirm('सारा टेक्स्ट डिलीट करें?')) {
            textItems = textItems.filter(t => t.page !== currentPage);
            fabricCanvas.clear();
            selectedTextId = null;
            updateTextList();
        }
    }

    function setTool(tool) {
        currentTool = tool;
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active', 'ocr-mode'));
        
        if (tool === 'selection') {
            document.getElementById('tool-selection').classList.add('active', 'ocr-mode');
        } else {
            document.getElementById(`tool-${tool}`).classList.add('active');
        }
        
        fabricCanvas.selection = (tool === 'select');
    }

    async function previousPage() {
        if (currentPage > 1) { 
            currentPage--; 
            await renderPage(currentPage);
            clearSelection();
        }
    }

    async function nextPage() {
        if (currentPage < totalPages) { 
            currentPage++; 
            await renderPage(currentPage);
            clearSelection();
        }
    }

    function zoomIn() { scale += 0.25; renderPage(currentPage); }
    function zoomOut() { if (scale > 0.5) { scale -= 0.25; renderPage(currentPage); } }

    async function exportPDF() {
        if (!pdfDoc) { alert('पहले PDF लोड करें।'); return; }
        
        showLoading('PDF बन रही है...');
        
        const canvas = document.getElementById('pdf-canvas');
        const textCanvas = document.getElementById('text-canvas');
        const combined = document.createElement('canvas');
        combined.width = canvas.width;
        combined.height = canvas.height;
        const ctx = combined.getContext('2d');
        
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, combined.width, combined.height);
        ctx.drawImage(canvas, 0, 0);
        ctx.drawImage(textCanvas, 0, 0);
        
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
            orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
            unit: 'px',
            format: [canvas.width, canvas.height]
        });
        
        pdf.addImage(combined.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, canvas.width, canvas.height);
        pdf.save('asur_selected_ocr.pdf');
        hideLoading();
    }

    function downloadPDF() { exportPDF(); }

    function showLoading(text = 'लोड हो रहा है...') {
        document.getElementById('loading-text').textContent = text;
        document.getElementById('loading').style.display = 'block';
    }

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }

    document.getElementById('font-size-slider').addEventListener('input', function() {
        document.getElementById('font-size-value').textContent = this.value;
    });

    window.onload = function() {
        console.log('ASUR SELECT & OCR READY');
    };
</script>

</body>
