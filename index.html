<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced PDF Editor - Text Replacer</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --panel: #1a1a1a; --accent: #ff3333; --text: #e0e0e0; }
        body { font-family: monospace; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: var(--panel); padding: 25px; border: 1px solid #333; border-radius: 8px; box-shadow: 0 0 15px rgba(255, 51, 51, 0.2); }
        h1 { color: var(--accent); text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tool-section { background: #111; padding: 15px; margin-top: 15px; border-left: 3px solid var(--accent); border-radius: 4px; }
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        input[type="number"], input[type="text"], input[type="file"] { background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; font-family: monospace; }
        button { background: var(--accent); color: #000; font-weight: bold; font-family: monospace; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #cc0000; color: white; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        #status { color: #00ff00; font-weight: bold; margin-top: 10px; }
        iframe { width: 100%; height: 600px; margin-top: 20px; background: #fff; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PDF TEXT REPLACER (MASKING BYPASS)</h1>
        
        <input type="file" id="uploadPdf" accept="application/pdf" />
        <p id="status">Status: Waiting for PDF...</p>

        <div class="tool-section">
            <h3>Mask & Replace Text (Page 1)</h3>
            <p style="font-size: 12px; color: #aaa;">Enter coordinates to place a white box over old text, and write new text over it. PDF origin (0,0) is bottom-left corner.</p>
            
            <div class="input-group">
                <input type="number" id="posX" placeholder="X Coord (e.g. 50)" value="50">
                <input type="number" id="posY" placeholder="Y Coord (e.g. 700)" value="700">
                <input type="number" id="boxW" placeholder="Box Width (e.g. 200)" value="200">
                <input type="number" id="boxH" placeholder="Box Height (e.g. 20)" value="20">
            </div>
            <div class="input-group">
                <input type="text" id="newText" placeholder="Enter New Text Here" style="flex: 1;" value="UPDATED TEXT DATA">
                <input type="number" id="fontSize" placeholder="Font Size" value="12" style="width: 80px;">
                <button id="btnReplace" onclick="maskAndReplace()" disabled>Execute Replace</button>
            </div>
        </div>

        <button id="btnDownload" onclick="downloadPdf()" disabled style="width: 100%; margin-top: 15px; background: #00cc66;">DOWNLOAD EDITED PDF</button>

        <iframe id="pdfViewer"></iframe>
    </div>

    <script>
        let currentPdfBytes = null;
        const { PDFDocument, rgb } = PDFLib;

        // 1. Load PDF
        document.getElementById('uploadPdf').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('status').innerText = 'Status: Loading PDF to memory...';
                currentPdfBytes = await file.arrayBuffer();
                document.getElementById('btnReplace').disabled = false;
                document.getElementById('btnDownload').disabled = false;
                document.getElementById('status').innerText = 'Status: Ready for execution.';
                displayPdf(currentPdfBytes);
            }
        });

        // 2. The Bypass: Mask old text with white box and write new text
        async function maskAndReplace() {
            if (!currentPdfBytes) return;
            try {
                document.getElementById('status').innerText = 'Status: Applying Mask & Replace...';
                
                const pdfDoc = await PDFDocument.load(currentPdfBytes);
                const pages = pdfDoc.getPages();
                const targetPage = pages[0]; // Edits Page 1
                
                // Get user inputs
                const x = parseFloat(document.getElementById('posX').value);
                const y = parseFloat(document.getElementById('posY').value);
                const w = parseFloat(document.getElementById('boxW').value);
                const h = parseFloat(document.getElementById('boxH').value);
                const text = document.getElementById('newText').value;
                const fSize = parseFloat(document.getElementById('fontSize').value);

                // Step A: Draw White Rectangle (The Mask)
                targetPage.drawRectangle({
                    x: x,
                    y: y,
                    width: w,
                    height: h,
                    color: rgb(1, 1, 1), // White color
                });

                // Step B: Draw New Text over the Mask
                targetPage.drawText(text, {
                    x: x + 2, // Slight padding from left edge of box
                    y: y + 5, // Slight padding from bottom edge of box
                    size: fSize,
                    color: rgb(0, 0, 0), // Black text
                });

                // Save and Display
                currentPdfBytes = await pdfDoc.save();
                document.getElementById('status').innerText = 'Status: Text replaced successfully. Adjust X,Y if alignment is off.';
                displayPdf(currentPdfBytes);
            } catch (err) {
                document.getElementById('status').innerText = 'Error: ' + err.message;
            }
        }

        // 3. Download
        function downloadPdf() {
            if (!currentPdfBytes) return;
            const blob = new Blob([currentPdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "Edited_Document.pdf";
            link.click();
            document.getElementById('status').innerText = 'Status: File Downloaded.';
        }

        // 4. Live Preview
        function displayPdf(pdfBytes) {
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const url = URL.createObjectURL(blob);
            document.getElementById('pdfViewer').src = url;
        }
    </script>
</body>
</html>
