<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITYA - Precision Snip Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --primary-hover: #2563eb; --bg: #0f172a; --panel: #1e293b; --border: #334155; --text: #f8fafc; }
        body { font-family: 'Hind', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        .header p { color: #94a3b8; margin: 0; font-size: 14px; }
        
        .toolbar { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; box-shadow: 0 10px 20px rgba(0,0,0,0.5); width: 100%; max-width: 900px; justify-content: center;}
        
        input[type="file"] { color: var(--text); font-size: 14px; cursor: pointer; width: 190px;}
        input[type="color"] { background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; height: 35px; width: 45px; padding: 2px; }
        input[type="number"] { background: #334155; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 8px; width: 60px; outline: none;}

        button { background: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: inherit;}
        button:hover { background: var(--primary-hover); transform: translateY(-1px);}
        button:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; transform: none;}
        
        .btn-snip { background: #ef4444; }
        .btn-snip:hover { background: #dc2626; }
        .btn-snip.active { background: #22c55e; animation: pulse 1.5s infinite; }
        .btn-green { background: #10b981; }
        .btn-green:hover { background: #059669; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

        #status { background: #1e293b; border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 4px; font-size: 14px; font-weight: bold; margin-bottom: 15px; width: 100%; max-width: 900px; text-align: center; }
        
        .canvas-container-wrapper { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: #000; }
    </style>
</head>
<body>

    <div class="header">
        <h1>DAITYA Sniper Editor</h1>
        <p>Select ONLY what you want. Zero Auto-Select interference.</p>
    </div>

    <div id="status">> Awaiting Image Upload.</div>

    <div class="toolbar">
        <div style="border-right: 1px solid var(--border); padding-right: 15px;">
            <input type="file" id="uploadImage" accept="image/*" />
        </div>
        
        <button class="btn-snip" id="btnDraw" onclick="toggleDrawMode()" disabled>✂️ Draw Box to Edit</button>

        <div style="display: flex; gap: 5px; align-items: center; margin-left: 10px;">
            <input type="color" id="textColor" value="#ffffff" disabled title="Change Text Color">
            <input type="number" id="textSize" value="20" disabled title="Change Font Size">
            <button id="btnDelete" onclick="deleteSelected()" disabled title="Delete Selected">🗑️</button>
        </div>

        <button class="btn-green" id="btnDownload" onclick="downloadImage()" disabled style="margin-left: auto;">⬇ Download HD</button>
    </div>

    <div class="canvas-container-wrapper">
        <canvas id="editorCanvas"></canvas>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        let canvas = new fabric.Canvas('editorCanvas', { selection: true });
        let originalImageElement = null; 
        let tempCanvasContext = null;

        // Manual Drawing Variables
        let isDrawingMode = false;
        let isMouseDown = false;
        let selectionRect = null;
        let startX, startY;

        function logStatus(msg) { statusEl.innerText = '> ' + msg; }

        // Load Image
        document.getElementById('uploadImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(f) {
                    fabric.Image.fromURL(f.target.result, function(img) {
                        canvas.clear();
                        canvas.setWidth(img.width);
                        canvas.setHeight(img.height);
                        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                        
                        originalImageElement = new Image();
                        originalImageElement.src = f.target.result;
                        originalImageElement.onload = () => {
                            let tempCanvas = document.createElement('canvas');
                            tempCanvas.width = img.width;
                            tempCanvas.height = img.height;
                            tempCanvasContext = tempCanvas.getContext('2d', { willReadFrequently: true });
                            tempCanvasContext.drawImage(originalImageElement, 0, 0);
                        };
                        
                        document.getElementById('btnDraw').disabled = false;
                        document.getElementById('btnDownload').disabled = false;
                        logStatus('Image loaded. Click [✂️ Draw Box to Edit] and select text on the image.');
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        // --- Manual Snipping Logic ---
        function toggleDrawMode() {
            isDrawingMode = !isDrawingMode;
            const btn = document.getElementById('btnDraw');
            
            if (isDrawingMode) {
                btn.classList.add('active');
                btn.innerText = 'Draw over text now...';
                canvas.defaultCursor = 'crosshair';
                canvas.selection = false; // Disable normal object selection while drawing
                canvas.discardActiveObject();
                canvas.renderAll();
                logStatus('MODE ACTIVE: Click and drag a box exactly over the old text.');
            } else {
                btn.classList.remove('active');
                btn.innerText = '✂️ Draw Box to Edit';
                canvas.defaultCursor = 'default';
                canvas.selection = true;
                logStatus('Selection mode disabled. You can now move or edit objects.');
            }
        }

        // Mouse Events for Drawing
        canvas.on('mouse:down', function(o) {
            if (!isDrawingMode) return;
            isMouseDown = true;
            let pointer = canvas.getPointer(o.e);
            startX = pointer.x;
            startY = pointer.y;

            selectionRect = new fabric.Rect({
                left: startX, top: startY, width: 0, height: 0,
                fill: 'rgba(239, 68, 68, 0.2)', // Red transparent
                stroke: '#ef4444', strokeWidth: 1, strokeDashArray: [3, 3],
                selectable: false, evented: false
            });
            canvas.add(selectionRect);
        });

        canvas.on('mouse:move', function(o) {
            if (!isDrawingMode || !isMouseDown) return;
            let pointer = canvas.getPointer(o.e);
            
            if(startX > pointer.x) { selectionRect.set({ left: Math.abs(pointer.x) }); }
            if(startY > pointer.y) { selectionRect.set({ top: Math.abs(pointer.y) }); }
            
            selectionRect.set({ width: Math.abs(startX - pointer.x) });
            selectionRect.set({ height: Math.abs(startY - pointer.y) });
            canvas.renderAll();
        });

        canvas.on('mouse:up', function(o) {
            if (!isDrawingMode || !isMouseDown) return;
            isMouseDown = false;
            
            if (selectionRect.width > 5 && selectionRect.height > 5) {
                processDrawnBox(selectionRect);
            } else {
                canvas.remove(selectionRect); // Ignore tiny accidental clicks
            }
            
            // Turn off drawing mode automatically after one snip
            toggleDrawMode(); 
        });

        // --- Processing the user's box ---
        function processDrawnBox(rectObj) {
            let x = Math.round(rectObj.left);
            let y = Math.round(rectObj.top);
            let w = Math.round(rectObj.width);
            let h = Math.round(rectObj.height);

            // 1. Extract exact colors from the drawn area
            let { bgColorHex, textColorHex } = extractStrictColors(x, y, w, h);

            // 2. Remove the red dashed selection box
            canvas.remove(rectObj);

            // 3. Create Solid Background Mask
            let maskRect = new fabric.Rect({
                left: x, top: y, width: w, height: h,
                fill: bgColorHex, selectable: false, evented: false
            });
            canvas.add(maskRect);
            maskRect.sendToBack();

            // 4. Spawn Editable Text
            let editableText = new fabric.IText('Edit Me', {
                left: x + 2, top: y + 2, 
                fontSize: h * 0.8, 
                fontFamily: 'Hind', 
                fill: textColorHex, 
                fontWeight: 600, 
                editable: true
            });

            canvas.add(editableText);
            canvas.setActiveObject(editableText);
            editableText.bringToFront();

            logStatus('Text masked successfully. Double-click the new text to edit it.');
        }

        // Color Extraction Engine
        function extractStrictColors(x, y, w, h) {
            // Get background color from the very edge of the drawn box
            let p = 2; // pixel border depth
            const bgAreas = [
                { rx: x, ry: y, rw: p, rh: h }, { rx: x + w - p, ry: y, rw: p, rh: h },
                { rx: x, ry: y, rw: w, rh: p }, { rx: x, ry: y + h - p, rw: w, rh: p }
            ];

            let r=0, g=0, b=0, count=0;
            bgAreas.forEach(area => {
                if (area.rw > 0 && area.rh > 0) {
                    let data = tempCanvasContext.getImageData(area.rx, area.ry, area.rw, area.rh).data;
                    for (let i = 0; i < data.length; i += 4) { r += data[i]; g += data[i+1]; b += data[i+2]; count++; }
                }
            });
            let bgR = Math.round(r/count)||255; let bgG = Math.round(g/count)||255; let bgB = Math.round(b/count)||255;

            // Get text color by finding highest contrast inside the box
            let textData = tempCanvasContext.getImageData(x, y, w, h).data;
            let maxContrast = [0,0,0]; let maxDist = -1;
            for (let i = 0; i < textData.length; i += 8) { 
                let dist = Math.sqrt(Math.pow(textData[i]-bgR, 2) + Math.pow(textData[i+1]-bgG, 2) + Math.pow(textData[i+2]-bgB, 2));
                if (dist > maxDist) { maxDist = dist; maxContrast = [textData[i], textData[i+1], textData[i+2]]; }
            }
            
            let txtHex = maxDist < 20 ? '#000000' : "#" + (1 << 24 | maxContrast[0] << 16 | maxContrast[1] << 8 | maxContrast[2]).toString(16).slice(1);
            let bgHex = "#" + (1 << 24 | bgR << 16 | bgG << 8 | bgB).toString(16).slice(1);
            
            return { bgColorHex: bgHex, textColorHex: txtHex };
        }

        // --- Live Edit UI ---
        canvas.on('selection:created', handleSelection);
        canvas.on('selection:updated', handleSelection);
        canvas.on('selection:cleared', () => {
            document.getElementById('textColor').disabled = true;
            document.getElementById('textSize').disabled = true;
            document.getElementById('btnDelete').disabled = true;
        });

        function handleSelection(e) {
            const obj = e.selected[0];
            if (obj && obj.type === 'i-text') {
                document.getElementById('textColor').disabled = false;
                document.getElementById('textSize').disabled = false;
                document.getElementById('btnDelete').disabled = false;
                document.getElementById('textColor').value = obj.fill || '#ffffff';
                document.getElementById('textSize').value = obj.fontSize || 20;
            }
        }

        document.getElementById('textColor').addEventListener('input', function(e) {
            if (canvas.getActiveObject()) { canvas.getActiveObject().set('fill', e.target.value); canvas.renderAll(); }
        });
        document.getElementById('textSize').addEventListener('input', function(e) {
            if (canvas.getActiveObject()) { canvas.getActiveObject().set('fontSize', parseInt(e.target.value)); canvas.renderAll(); }
        });

        function deleteSelected() {
            if (canvas.getActiveObject()) { canvas.remove(canvas.getActiveObject()); }
        }

        function downloadImage() {
            canvas.discardActiveObject(); canvas.renderAll();
            let link = document.createElement('a');
            link.download = 'DAITYA_Sniper_Output.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1 }); link.click();
        }
    </script>
</body>
</html>
