<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Text Replacer (Workaround)</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h2 { margin-top: 0; color: #333; }
        input[type="file"], input[type="number"], input[type="text"] { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .row { display: flex; gap: 10px; }
        .row input { width: 45%; }
        button { background: #dc3545; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px;}
        button:hover { background: #c82333; }
        label { font-size: 13px; color: #666; font-weight: bold; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Replace Text in PDF</h2>
    <p style="font-size: 13px; color: #555;">(Ye tool purane text ko safed dabbe se chupa kar uske upar naya text likhta hai)</p>
    
    <label>1. Upload PDF:</label>
    <input type="file" id="pdfInput" accept="application/pdf">

    <label>2. Set Position & Box Size (X, Y, Width, Height):</label>
    <div class="row">
        <input type="number" id="posX" placeholder="X Position (e.g. 100)">
        <input type="number" id="posY" placeholder="Y Position (e.g. 500)">
    </div>
    <div class="row">
        <input type="number" id="boxW" placeholder="Box Width (e.g. 150)">
        <input type="number" id="boxH" placeholder="Box Height (e.g. 20)">
    </div>

    <label>3. Naya Text Likhien:</label>
    <input type="text" id="newText" placeholder="Purane text ki jagah kya likhna hai?">

    <button id="replaceBtn">Replace & Download</button>
    <div id="status"></div>
</div>

<script>
    let pdfBytesOriginal = null;
    let fileName = "edited_file.pdf";

    document.getElementById('pdfInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
            fileName = file.name.replace('.pdf', '') + "_replaced.pdf";
            const buffer = await file.arrayBuffer();
            pdfBytesOriginal = new Uint8Array(buffer);
            document.getElementById('status').innerText = "PDF Loaded!";
            document.getElementById('status').style.color = "blue";
        }
    });

    document.getElementById('replaceBtn').addEventListener('click', async () => {
        if (!pdfBytesOriginal) {
            alert("Pehle PDF upload karein!"); return;
        }

        const x = parseFloat(document.getElementById('posX').value);
        const y = parseFloat(document.getElementById('posY').value);
        const w = parseFloat(document.getElementById('boxW').value);
        const h = parseFloat(document.getElementById('boxH').value);
        const text = document.getElementById('newText').value;

        if (!x || !y || !w || !h || !text) {
            alert("Kripya sabhi X, Y, Width, Height aur Naya Text bharein."); return;
        }

        try {
            document.getElementById('status').innerText = "Processing...";
            const { PDFDocument, rgb } = PDFLib;
            const pdfDoc = await PDFDocument.load(pdfBytesOriginal);
            const pages = pdfDoc.getPages();
            const firstPage = pages[0];

            // 1. Purane text ke upar Safed (White) Box draw karna
            firstPage.drawRectangle({
                x: x,
                y: y,
                width: w,
                height: h,
                color: rgb(1, 1, 1), // White color
            });

            // 2. Usi jagah par Naya Text draw karna (Y me thoda adjust karke taaki box ke andar aaye)
            firstPage.drawText(text, {
                x: x + 2,
                y: y + 4,
                size: 12,
                color: rgb(0, 0, 0), // Black color text
            });

            const modifiedPdfBytes = await pdfDoc.save();
            
            // Download process
            const blob = new Blob([modifiedPdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            document.getElementById('status').innerText = "Download Successful! ✅";
            document.getElementById('status').style.color = "green";

        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "Error in replacing text.";
            document.getElementById('status').style.color = "red";
        }
    });
</script>

</body>
</html>
