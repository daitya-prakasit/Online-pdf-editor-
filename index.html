<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAITYA - Pro PDF Editor</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --primary: #00ffcc;
            --text-light: #c9d1d9;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-light); 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
        }
        h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px;}
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            border: 1px solid #30363d;
        }
        .upload-area {
            border: 2px dashed #30363d;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input[type="file"] { 
            background: #21262d; 
            color: white; 
            padding: 10px;
            border-radius: 5px; 
            cursor: pointer;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        button { 
            background: var(--primary); 
            color: #000; 
            border: none; 
            padding: 12px 24px; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 14px;
            transition: all 0.3s ease; 
        }
        button:hover { 
            background: #00b38f; 
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 255, 204, 0.3);
        }
        button:disabled {
            background: #30363d;
            color: #8b949e;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        #status { 
            margin-top: 15px; 
            font-weight: bold;
            color: #f2cc60; 
        }
        iframe { 
            width: 100%; 
            height: 600px; 
            margin-top: 20px; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            display: none; 
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DAITYA PDF Editor</h1>
        <p>Bypass restrictions, edit locally. 100% Client-Side Processing.</p>

        <div class="upload-area">
            <input type="file" id="uploadPdf" accept="application/pdf" />
        </div>

        <div class="controls">
            <button id="btnText" onclick="addText()" disabled>Add Red Text</button>
            <button id="btnPage" onclick="addBlankPage()" disabled>Add Blank Page</button>
            <button id="btnDownload" onclick="downloadPdf()" disabled>Download Modified PDF</button>
        </div>

        <p id="status">Waiting for PDF upload...</p>
        <iframe id="pdfViewer"></iframe>
    </div>

    <script>
        let currentPdfBytes = null;
        const { PDFDocument, rgb } = PDFLib;

        // Handle File Upload
        document.getElementById('uploadPdf').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                updateStatus('Loading PDF into memory...');
                currentPdfBytes = await file.arrayBuffer();
                enableButtons();
                updateStatus('PDF Loaded Successfully. System Ready.');
                displayPdf(currentPdfBytes);
            }
        });

        // Function: Add Text to First Page
        async function addText() {
            if (!currentPdfBytes) return;
            try {
                updateStatus('Processing modification...');
                const pdfDoc = await PDFDocument.load(currentPdfBytes);
                const pages = pdfDoc.getPages();
                const firstPage = pages[0];
                const { width, height } = firstPage.getSize();

                firstPage.drawText('Hacked by DAITYA', {
                    x: 50,
                    y: height - 50,
                    size: 35,
                    color: rgb(1, 0.2, 0.2), // Red color
                });

                currentPdfBytes = await pdfDoc.save();
                updateStatus('Payload injected: Text added to page 1.');
                displayPdf(currentPdfBytes);
            } catch (err) {
                updateStatus('Error: ' + err.message);
            }
        }

        // Function: Add Blank Page
        async function addBlankPage() {
            if (!currentPdfBytes) return;
            try {
                updateStatus('Injecting new page...');
                const pdfDoc = await PDFDocument.load(currentPdfBytes);
                pdfDoc.addPage();
                currentPdfBytes = await pdfDoc.save();
                updateStatus('Modification complete: Blank page added at the end.');
                displayPdf(currentPdfBytes);
            } catch (err) {
                updateStatus('Error: ' + err.message);
            }
        }

        // Function: Download the output
        function downloadPdf() {
            if (!currentPdfBytes) return;
            const blob = new Blob([currentPdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "Daitya_Edited_Output.pdf";
            link.click();
            updateStatus('Download triggered successfully.');
        }

        // Function: Render PDF in Iframe
        function displayPdf(pdfBytes) {
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const url = URL.createObjectURL(blob);
            const viewer = document.getElementById('pdfViewer');
            viewer.src = url;
            viewer.style.display = 'block';
        }

        function updateStatus(msg) {
            document.getElementById('status').innerText = '> ' + msg;
        }

        function enableButtons() {
            document.getElementById('btnText').disabled = false;
            document.getElementById('btnPage').disabled = false;
            document.getElementById('btnDownload').disabled = false;
        }
    </script>
</body>
</html>
