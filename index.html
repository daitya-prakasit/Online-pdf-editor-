<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Image Text Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f59e0b; --primary-hover: #d97706; --bg: #171717; --panel: #262626; --border: #404040; --text: #f5f5f5; }
        body { font-family: 'Hind', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        .header p { color: #a3a3a3; margin: 0; font-size: 14px; }
        
        .toolbar { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; box-shadow: 0 10px 20px rgba(0,0,0,0.5); width: 100%; max-width: 1000px; justify-content: center;}
        .tool-group { display: flex; align-items: center; gap: 8px; }
        
        input[type="file"] { color: var(--text); font-size: 14px; cursor: pointer; width: 190px;}
        input[type="color"] { background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; height: 35px; width: 45px; padding: 2px; }
        input[type="number"] { background: #404040; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 8px; width: 60px; outline: none;}
        input[type="text"] { background: #404040; color: white; border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; width: 220px; outline: none; font-family: inherit;}
        input[type="text"]:focus { border-color: var(--primary); }

        button { background: var(--primary); color: #000; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #525252; color: #a3a3a3; cursor: not-allowed; }
        .btn-green { background: #10b981; color: white; }
        .btn-green:hover { background: #059669; }

        #status { background: #262626; border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-bottom: 15px; width: 100%; max-width: 1000px; text-align: center; }
        
        .canvas-container-wrapper { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: #000; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Precision Text Overrider</h1>
        <p>Strict Bounding-Box Masking | Exact Color Matching | Zero Bleed</p>
    </div>

    <div id="status">> Awaiting Image Upload.</div>

    <div class="toolbar">
        <div class="tool-group" style="border-right: 1px solid var(--border); padding-right: 15px;">
            <input type="file" id="uploadImage" accept="image/*" />
        </div>
        
        <div class="tool-group">
            <input type="text" id="liveTextInput" placeholder="Click green box to edit..." disabled>
        </div>

        <div class="tool-group">
            <input type="color" id="textColor" value="#ffffff" disabled title="Text Color">
        </div>
        
        <div class="tool-group">
            <input type="number" id="textSize" value="20" min="5" max="200" disabled title="Font Size">
        </div>

        <button id="btnDelete" onclick="deleteSelected()" disabled title="Delete Selected">🗑️</button>
        <button class="btn-green" id="btnDownload" onclick="downloadImage()" disabled>⬇ Download</button>
    </div>

    <div class="canvas-container-wrapper">
        <canvas id="editorCanvas"></canvas>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        let canvas = new fabric.Canvas('editorCanvas', { selection: true });
        let originalImageElement = null; 
        let tempCanvasContext = null;

        function logStatus(msg) { statusEl.innerText = '> ' + msg; }

        // Live Editor Listeners
        document.getElementById('liveTextInput').addEventListener('input', function(e) {
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                activeObj.set('text', e.target.value);
                canvas.renderAll();
            }
        });

        document.getElementById('textColor').addEventListener('input', function(e) {
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                activeObj.set('fill', e.target.value);
                canvas.renderAll();
            }
        });

        document.getElementById('textSize').addEventListener('input', function(e) {
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                activeObj.set('fontSize', parseInt(e.target.value));
                canvas.renderAll();
            }
        });

        function enableTools(enable) {
            document.getElementById('liveTextInput').disabled = !enable;
            document.getElementById('textColor').disabled = !enable;
            document.getElementById('textSize').disabled = !enable;
            document.getElementById('btnDelete').disabled = !enable;
            if(!enable) document.getElementById('liveTextInput').value = '';
        }

        function deleteSelected() {
            const activeObj = canvas.getActiveObject();
            if (activeObj) {
                canvas.remove(activeObj);
                enableTools(false);
            }
        }

        canvas.on('selection:created', handleSelection);
        canvas.on('selection:updated', handleSelection);
        canvas.on('selection:cleared', () => enableTools(false));
        canvas.on('text:changed', function(e) {
            if(e.target) document.getElementById('liveTextInput').value = e.target.text;
        });

        function handleSelection(e) {
            const obj = e.selected[0];
            if (obj && obj.type === 'i-text') {
                enableTools(true);
                document.getElementById('liveTextInput').value = obj.text;
                document.getElementById('textColor').value = obj.fill || '#ffffff';
                document.getElementById('textSize').value = obj.fontSize || 20;
            } else {
                enableTools(false);
            }
        }

        document.getElementById('uploadImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(f) {
                    fabric.Image.fromURL(f.target.result, function(img) {
                        canvas.clear();
                        canvas.setWidth(img.width);
                        canvas.setHeight(img.height);
                        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                        
                        originalImageElement = new Image();
                        originalImageElement.src = f.target.result;
                        originalImageElement.onload = () => {
                            let tempCanvas = document.createElement('canvas');
                            tempCanvas.width = img.width;
                            tempCanvas.height = img.height;
                            tempCanvasContext = tempCanvas.getContext('2d', { willReadFrequently: true });
                            tempCanvasContext.drawImage(originalImageElement, 0, 0);
                            
                            scanImageForText(f.target.result);
                        };
                        
                        document.getElementById('btnDownload').disabled = false;
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        async function scanImageForText(imgData) {
            logStatus('Scanning pixels... Wait.');
            try {
                const { data: { words } } = await Tesseract.recognize(imgData, 'eng+hin');
                words.forEach(word => {
                    if (word.text.trim().length > 0 && word.confidence > 50) createOcrBox(word);
                });
                logStatus('Scan complete. Click exact word to mask and edit.');
            } catch (err) {
                logStatus('OCR Error: ' + err.message);
            }
        }

        function createOcrBox(word) {
            const { x0, y0, x1, y1 } = word.bbox;
            const width = x1 - x0;
            const height = y1 - y0;

            const rect = new fabric.Rect({
                left: x0, top: y0, width: width, height: height,
                fill: 'rgba(34, 197, 94, 0.2)', stroke: '#10b981', strokeWidth: 1.5, strokeDashArray: [4, 4],
                selectable: false, hoverCursor: 'pointer', isOcrBox: true, ocrWord: word
            });

            rect.on('mousedown', function() { unlockText(this); });
            canvas.add(rect);
        }

        function unlockText(ocrBoxObj) {
            const word = ocrBoxObj.ocrWord;
            const { x0, y0, x1, y1 } = word.bbox;
            const width = x1 - x0; 
            const height = y1 - y0;

            // Get exact background color strictly from this box
            const { bgColorHex, textColorHex } = extractStrictColors(word.bbox);
            canvas.remove(ocrBoxObj);

            // EXACT MASK: Zero padding. Fits perfectly over the word only.
            const maskRect = new fabric.Rect({
                left: x0 - 1, top: y0 - 1, // 1px anti-alias bleed tolerance
                width: width + 2, height: height + 2,
                fill: bgColorHex, selectable: false, evented: false
            });
            canvas.add(maskRect); 
            maskRect.sendToBack();

            // Editable Text Object spawned exactly inside the box limits
            const editableText = new fabric.IText(word.text, {
                left: x0, top: y0, 
                fontSize: height * 0.9, 
                fontFamily: 'Hind', 
                fill: textColorHex, 
                fontWeight: 600, 
                editable: true
            });

            canvas.add(editableText);
            canvas.setActiveObject(editableText);
            editableText.bringToFront();
        }

        function extractStrictColors(bbox) {
            const { x0, y0, x1, y1 } = bbox;
            const w = x1 - x0; const h = y1 - y0;
            
            // Sample strictly the immediate inner border for background to avoid neighboring text
            const p = 2; 
            const bgAreas = [
                { x: x0, y: y0, w: p, h: h }, { x: x1 - p, y: y0, w: p, h: h },
                { x: x0, y: y0, w: w, h: p }, { x: x0, y: y1 - p, w: w, h: p }
            ];

            let r=0, g=0, b=0, count=0;
            bgAreas.forEach(rect => {
                if (rect.w > 0 && rect.h > 0) {
                    const data = tempCanvasContext.getImageData(rect.x, rect.y, rect.w, rect.h).data;
                    for (let i = 0; i < data.length; i += 4) { r += data[i]; g += data[i+1]; b += data[i+2]; count++; }
                }
            });
            const bgR = Math.round(r/count)||255; const bgG = Math.round(g/count)||255; const bgB = Math.round(b/count)||255;

            // Get text color by finding highest contrast inside the box
            const textData = tempCanvasContext.getImageData(x0, y0, w, h).data;
            let maxContrast = [0,0,0]; let maxDistance = -1;
            for (let i = 0; i < textData.length; i += 8) { 
                const distance = Math.sqrt(Math.pow(textData[i]-bgR, 2) + Math.pow(textData[i+1]-bgG, 2) + Math.pow(textData[i+2]-bgB, 2));
                if (distance > maxDistance) { maxDistance = distance; maxContrast = [textData[i], textData[i+1], textData[i+2]]; }
            }
            return { bgColorHex: rgbToHex(bgR, bgG, bgB), textColorHex: maxDistance < 20 ? '#000000' : rgbToHex(maxContrast[0], maxContrast[1], maxContrast[2]) };
        }

        function rgbToHex(r, g, b) { return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).padStart(6, '0'); }

        function downloadImage() {
            canvas.discardActiveObject(); canvas.renderAll();
            const link = document.createElement('a');
            link.download = 'Precision_Output.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1 }); link.click();
        }

        canvas.on('mouse:move', function(e) { canvas.defaultCursor = (e.target && e.target.isOcrBox) ? 'pointer' : 'default'; });
    </script>
</body>
</html>
